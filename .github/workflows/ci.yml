name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    # No gate-password env vars here on purpose. The auth-passwords
    # vitest mocks the generated module via vi.mock and mints fixture
    # hashes in beforeAll; the `pretest` script
    # (scripts/ensure-auth-hashes-stub.cjs) writes a non-clobbering stub
    # so Vite's import-analysis can resolve the module path. Real
    # secrets only flow through release workflows (Desktop, Docker).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  docker:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [lint-typecheck, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64,linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/weatherv1-next:${{ github.ref_name }}
          # Forwarded to Dockerfile ARGs so the prebuild hash-emit step
          # has the plaintext passwords during `npm run build`. Build
          # args do not persist into the final image layers as env vars
          # unless explicitly re-ENVed, which the Dockerfile does not.
          build-args: |
            EDITOR_PASSWORD=${{ secrets.EDITOR_PASSWORD }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
