# Runs Pulumi against the dev stack on changes under infra/cloudflare/**.
#
# - pull_request → `pulumi preview` (read-only; posts a diff comment).
# - push to main → `pulumi up --yes` (applies).
#
# Both modes need PULUMI_CONFIG_PASSPHRASE to decrypt the secure: values in
# infra/cloudflare/Pulumi.dev.yaml. See infra/cloudflare/README.md
# ("Secrets ownership & rotation").
name: Infrastructure

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/cloudflare/**"
      - ".github/workflows/infra.yml"
  push:
    branches: [main]
    paths:
      - "infra/cloudflare/**"
      - ".github/workflows/infra.yml"

# Serialize applies to main so two concurrent `pulumi up` runs can't race
# the same stack. Previews on PRs are isolated per-branch and cancel stale
# runs on force-push; applies never cancel mid-flight (would wedge a stack).
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && 'main-apply' || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pulumi:
    name: ${{ github.event_name == 'pull_request' && 'preview' || 'up' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # for the preview comment
    defaults:
      run:
        working-directory: infra/cloudflare
    env:
      PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
      PULUMI_STACK: dev
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: infra/cloudflare/package-lock.json

      - run: npm ci

      - name: Pulumi preview (PR)
        if: ${{ github.event_name == 'pull_request' }}
        uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: ${{ env.PULUMI_STACK }}
          work-dir: infra/cloudflare
          comment-on-pr: true

      - name: Pulumi up (main)
        if: ${{ github.event_name == 'push' }}
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ env.PULUMI_STACK }}
          work-dir: infra/cloudflare
