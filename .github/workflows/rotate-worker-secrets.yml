name: Rotate Worker secrets

# Pushes the current values of EDITOR_PASSWORD (used as both the editor
# login secret and the Worker Basic-Auth password) and R2_APP_USERNAME
# into the deployed R2-gateway Worker as `WEATHERV1_APP_PASSWORD` and
# `WEATHERV1_APP_USERNAME` bindings.
#
# Run after rotating EDITOR_PASSWORD in GitHub secrets. Idempotent: if
# the values already match, the Worker just gets a no-op new version.
#
# Single source of truth: GitHub secret EDITOR_PASSWORD. The desktop app
# bakes its hash into the build; the Worker holds its plaintext. The
# matching username defaults to "v1editor".

on:
  workflow_dispatch: {}

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Write secrets file
        env:
          EDITOR_PASSWORD: ${{ secrets.EDITOR_PASSWORD }}
          R2_APP_USERNAME: ${{ secrets.R2_APP_USERNAME }}
        run: |
          set -euo pipefail
          : "${EDITOR_PASSWORD:?EDITOR_PASSWORD must be set}"
          USERNAME="${R2_APP_USERNAME:-v1editor}"
          # `wrangler secret bulk` reads a JSON {NAME: value} map.
          jq -nc \
            --arg user "$USERNAME" \
            --arg pass "$EDITOR_PASSWORD" \
            '{WEATHERV1_APP_USERNAME: $user, WEATHERV1_APP_PASSWORD: $pass}' \
            > /tmp/worker-secrets.json
      - name: Push secrets to Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: infra/cloudflare
          command: secret bulk /tmp/worker-secrets.json
      - name: Verify Worker auth works end-to-end
        env:
          EDITOR_PASSWORD: ${{ secrets.EDITOR_PASSWORD }}
          R2_APP_USERNAME: ${{ secrets.R2_APP_USERNAME }}
        run: |
          set -euo pipefail
          USERNAME="${R2_APP_USERNAME:-v1editor}"
          CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
            -u "$USERNAME:$EDITOR_PASSWORD" \
            "https://weatherv1-r2-gateway.barprojectsandbuilds.workers.dev/v1/catalog?tenantId=default")
          echo "/v1/catalog -> $CODE"
          test "$CODE" = "200"
      - name: Cleanup secrets file
        if: always()
        run: rm -f /tmp/worker-secrets.json
