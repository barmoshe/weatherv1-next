name: Rotate Worker secrets

# Pushes the current values of EDITOR_PASSWORD (used as both the editor
# login secret and the Worker Basic-Auth password) and R2_APP_USERNAME
# into the deployed R2-gateway Worker as `WEATHERV1_APP_PASSWORD` and
# `WEATHERV1_APP_USERNAME` bindings.
#
# Run after rotating EDITOR_PASSWORD in GitHub secrets. Idempotent: if
# the values already match, the Worker just gets a no-op new version.
#
# Single source of truth: GitHub secret EDITOR_PASSWORD. The desktop app
# bakes its hash into the build; the Worker holds its plaintext. The
# matching username defaults to "v1editor".

on:
  workflow_dispatch: {}

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Write secrets file
        env:
          EDITOR_PASSWORD: ${{ secrets.EDITOR_PASSWORD }}
          R2_APP_USERNAME: ${{ secrets.R2_APP_USERNAME }}
        run: |
          set -euo pipefail
          : "${EDITOR_PASSWORD:?EDITOR_PASSWORD must be set}"
          USERNAME="${R2_APP_USERNAME:-v1editor}"
          # `wrangler secret bulk` reads a JSON {NAME: value} map.
          jq -nc \
            --arg user "$USERNAME" \
            --arg pass "$EDITOR_PASSWORD" \
            '{WEATHERV1_APP_USERNAME: $user, WEATHERV1_APP_PASSWORD: $pass}' \
            > /tmp/worker-secrets.json
      - name: Push secrets to Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: infra/cloudflare
          command: secret bulk /tmp/worker-secrets.json
      - name: Verify Worker auth works end-to-end
        env:
          EDITOR_PASSWORD: ${{ secrets.EDITOR_PASSWORD }}
          R2_APP_USERNAME: ${{ secrets.R2_APP_USERNAME }}
        run: |
          set -euo pipefail
          USERNAME="${R2_APP_USERNAME:-v1editor}"
          URL="https://weatherv1-r2-gateway.barprojectsandbuilds.workers.dev/v1/catalog?tenantId=default"
          # New password must pass auth. 200 (catalog present) and 404
          # (tenant has no catalog yet) are both authorized responses;
          # 401/403 mean the new secret didn't take.
          #
          # `wrangler secret bulk` returns before the new Worker version has
          # rolled out to every edge, so an immediate curl can still hit the
          # old version and 401. Retry with backoff before declaring failure.
          GOOD=""
          for attempt in 1 2 3 4 5 6; do
            GOOD=$(curl -sS -o /dev/null -w '%{http_code}' -u "$USERNAME:$EDITOR_PASSWORD" "$URL")
            echo "attempt $attempt: new password /v1/catalog -> $GOOD"
            case "$GOOD" in 200|404) break ;; esac
            if [ "$attempt" -lt 6 ]; then sleep 5; fi
          done
          case "$GOOD" in 200|404) ;; *) echo "::error::new password rejected after retries ($GOOD)"; exit 1;; esac
          # Bogus password must be rejected — proves the auth gate is live.
          BAD=$(curl -sS -o /dev/null -w '%{http_code}' -u "$USERNAME:wrong-password-$(date +%s)" "$URL")
          echo "bogus password /v1/catalog -> $BAD"
          test "$BAD" = "401"
      - name: Cleanup secrets file
        if: always()
        run: rm -f /tmp/worker-secrets.json
