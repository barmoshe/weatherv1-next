# Publishes the Windows installer after "Desktop" completes. This file must
# live on the default branch — workflow_run only fires when a matching
# workflow exists on default (see GitHub docs: "Events that trigger
# workflows" → workflow_run). Cross-run artifact download requires
# github-token + run-id (actions/download-artifact v4 README). Tag identity:
# github.event.workflow_run.head_branch is the tag for tag-triggered runs;
# we also upload release-ref from Desktop for a canonical name.
name: Desktop publish to R2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish assets to, for example v0.1.1"
        required: true
        type: string
      run_id:
        description: "Desktop workflow run ID that uploaded desktop-windows-latest"
        required: true
        type: string
  workflow_run:
    workflows: [Desktop]
    types: [completed]

jobs:
  publish:
    name: Upload Windows installer to R2
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       (startsWith(github.event.workflow_run.head_branch, 'refs/tags/v') ||
        (startsWith(github.event.workflow_run.head_branch, 'v') && !contains(github.event.workflow_run.head_branch, '/'))))
    permissions:
      actions: read
    steps:
      - name: Download tag ref (optional)
        id: tagref
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: release-ref
          path: meta
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event_name == 'workflow_dispatch' && inputs.run_id || github.event.workflow_run.id }}

      - uses: actions/download-artifact@v4
        with:
          name: desktop-windows-latest
          path: win
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event_name == 'workflow_dispatch' && inputs.run_id || github.event.workflow_run.id }}

      - name: Assemble stable asset names
        env:
          DESKTOP_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.run_id || github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          mkdir -p dist
          WIN_EXE="$(find win -type f -name 'WeatherV1-Setup.exe' ! -path '*/node_modules/*' | head -n 1)"
          if [[ -z "$WIN_EXE" ]]; then
            WIN_EXE="$(find win -type f -path '*/squirrel.windows/*/*.exe' ! -path '*/node_modules/*' | head -n 1)"
          fi
          if [[ -z "$WIN_EXE" ]]; then
            echo "No Windows setup .exe in desktop-windows-latest for run ${DESKTOP_RUN_ID}"
            find win -type f 2>/dev/null | head -80 || true
            exit 1
          fi
          cp "$WIN_EXE" dist/WeatherV1-Setup.exe
          ls -la dist

      - name: Resolve release tag
        id: reltag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-}"
          TAGFILE=""
          if [[ -d meta ]]; then
            TAGFILE="$(find meta -type f -name tag 2>/dev/null | head -n 1 || true)"
          fi
          if [[ -n "$TAGFILE" ]]; then
            TAG="$(tr -d '\n\r ' < "$TAGFILE")"
          fi
          if [[ -z "$TAG" && -n "${HEAD_BRANCH:-}" ]]; then
            TAG="${HEAD_BRANCH#refs/tags/}"
          fi
          TAG="${TAG#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            echo "Could not resolve tag (release-ref and head_branch). head_branch=${HEAD_BRANCH:-<empty>}"
            exit 1
          fi
          echo "Resolved tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Upload installer to R2
        # TODO(latest-stable): once we adopt a stable-vs-prerelease tag convention
        # (e.g. SemVer prerelease suffix: vX.Y.Z stable, vX.Y.Z-beta.N prerelease),
        # gate a third `wrangler r2 object put` to
        # downloads/windows/latest-stable/WeatherV1-Setup.exe on the stable check.
        uses: cloudflare/wrangler-action@v3
        with:
          # R2-only token, scoped to Workers R2 Storage:Edit on weatherv1-media.
          # Distinct from CLOUDFLARE_API_TOKEN (Pages-deploy scope) so each
          # secret's blast radius matches its purpose.
          apiToken: ${{ secrets.CLOUDFLARE_R2_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The action's default wrangler 3.x caps `r2 object put` at 300 MiB;
          # wrangler 4.x auto-uses multipart upload for larger files, which
          # the WeatherV1 installer exceeds (Electron + ffmpeg ≈ 350-400 MiB).
          # Wrangler 4 also added a local R2 simulator that becomes the
          # default target — `--remote` on each command (below) is required
          # to actually hit the real bucket. Without it, every put "succeeds"
          # by writing to .wrangler/state/v3/r2/... on the runner.
          wranglerVersion: "4"
          # wrangler-action runs `command:` via exec() (no shell), so shell
          # variable expansions like ${BUCKET}/${TAG} never resolve and become
          # part of the path. Use GitHub Actions ${{ … }} expression syntax
          # so the runner substitutes before the action sees the string.
          # Each line is one wrangler invocation; no backslash continuations.
          command: |
            r2 object put weatherv1-media/downloads/windows/${{ steps.reltag.outputs.tag }}/WeatherV1-Setup.exe --file=dist/WeatherV1-Setup.exe --content-type=application/octet-stream --remote
            r2 object put weatherv1-media/downloads/windows/latest/WeatherV1-Setup.exe --file=dist/WeatherV1-Setup.exe --content-type=application/octet-stream --remote
