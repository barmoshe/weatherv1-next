# Publishes the Windows installer after "Desktop" completes. This file must
# live on the default branch — workflow_run only fires when a matching
# workflow exists on default (see GitHub docs: "Events that trigger
# workflows" → workflow_run). Cross-run artifact download requires
# github-token + run-id (actions/download-artifact v4 README). Tag identity:
# github.event.workflow_run.head_branch is the tag for tag-triggered runs;
# we also upload release-ref from Desktop for a canonical name.
name: Desktop publish to R2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish assets to, for example v0.1.1"
        required: true
        type: string
      run_id:
        description: "Desktop workflow run ID that uploaded desktop-windows-latest"
        required: true
        type: string
  workflow_run:
    workflows: [Desktop]
    types: [completed]

jobs:
  publish:
    name: Upload Windows installer to R2
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       (startsWith(github.event.workflow_run.head_branch, 'refs/tags/v') ||
        (startsWith(github.event.workflow_run.head_branch, 'v') && !contains(github.event.workflow_run.head_branch, '/'))))
    permissions:
      actions: read
    steps:
      - name: Download tag ref (optional)
        id: tagref
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: release-ref
          path: meta
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event_name == 'workflow_dispatch' && inputs.run_id || github.event.workflow_run.id }}

      - uses: actions/download-artifact@v4
        with:
          name: desktop-windows-latest
          path: win
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event_name == 'workflow_dispatch' && inputs.run_id || github.event.workflow_run.id }}

      - name: Assemble stable asset names
        env:
          DESKTOP_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.run_id || github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          mkdir -p dist
          WIN_EXE="$(find win -type f -name 'WeatherV1-Setup.exe' ! -path '*/node_modules/*' | head -n 1)"
          if [[ -z "$WIN_EXE" ]]; then
            WIN_EXE="$(find win -type f -path '*/squirrel.windows/*/*.exe' ! -path '*/node_modules/*' | head -n 1)"
          fi
          if [[ -z "$WIN_EXE" ]]; then
            echo "No Windows setup .exe in desktop-windows-latest for run ${DESKTOP_RUN_ID}"
            find win -type f 2>/dev/null | head -80 || true
            exit 1
          fi
          cp "$WIN_EXE" dist/WeatherV1-Setup.exe
          ls -la dist

      - name: Resolve release tag
        id: reltag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-}"
          TAGFILE=""
          if [[ -d meta ]]; then
            TAGFILE="$(find meta -type f -name tag 2>/dev/null | head -n 1 || true)"
          fi
          if [[ -n "$TAGFILE" ]]; then
            TAG="$(tr -d '\n\r ' < "$TAGFILE")"
          fi
          if [[ -z "$TAG" && -n "${HEAD_BRANCH:-}" ]]; then
            TAG="${HEAD_BRANCH#refs/tags/}"
          fi
          TAG="${TAG#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            echo "Could not resolve tag (release-ref and head_branch). head_branch=${HEAD_BRANCH:-<empty>}"
            exit 1
          fi
          echo "Resolved tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # Upload via R2's S3-compatible endpoint: wrangler r2 object put caps at
      # 300 MiB and the installer is ~437 MiB. aws-cli is preinstalled on
      # ubuntu-latest and auto-multiparts. Credentials are S3-style, issued
      # via Cloudflare dashboard → R2 → Manage R2 API Tokens.
      - name: Upload installer to R2 (S3 API)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          TAG: ${{ steps.reltag.outputs.tag }}
          # TODO(latest-stable): once we adopt a stable-vs-prerelease tag
          # convention, gate a third destination "latest-stable" inside the
          # POINTERS list on the stable check.
          POINTERS: latest
        run: |
          set -euo pipefail
          BASE="s3://weatherv1-media/downloads/windows"
          VERSIONED="${BASE}/${TAG}/WeatherV1-Setup.exe"
          # First upload uses the runner's local copy. Pointer keys are then
          # server-side CopyObject from the versioned key — saves ~437 MiB
          # egress per pointer. R2 supports CopyObject via the S3 API
          # (5 GiB single-part limit, well above our installer size).
          aws s3 cp dist/WeatherV1-Setup.exe "$VERSIONED" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type application/octet-stream
          for POINTER in $POINTERS; do
            aws s3 cp "$VERSIONED" "${BASE}/${POINTER}/WeatherV1-Setup.exe" \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type application/octet-stream \
              --metadata-directive REPLACE
          done
