# Publishes installers after "Desktop" completes. This file must live on the
# default branch — workflow_run only fires when a matching workflow exists on
# default (see GitHub docs: "Events that trigger workflows" → workflow_run).
# Cross-run artifact download requires github-token + run-id (actions/download-artifact v4 README).
# Tag identity: github.event.workflow_run.head_branch is the tag for tag-triggered runs
# (community + SO); we also upload release-ref from Desktop for a canonical name.
name: Desktop publish release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish assets to, for example v0.1.1"
        required: true
        type: string
      run_id:
        description: "Desktop workflow run ID that uploaded desktop-macos-latest and desktop-windows-latest"
        required: true
        type: string
  workflow_run:
    workflows: [Desktop]
    types: [completed]

jobs:
  publish:
    name: Attach installers to GitHub Release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       (startsWith(github.event.workflow_run.head_branch, 'refs/tags/v') ||
        (startsWith(github.event.workflow_run.head_branch, 'v') && !contains(github.event.workflow_run.head_branch, '/'))))
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download tag ref (optional)
        id: tagref
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: release-ref
          path: meta
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event_name == 'workflow_dispatch' && inputs.run_id || github.event.workflow_run.id }}

      - uses: actions/download-artifact@v4
        with:
          name: desktop-macos-13
          path: mac
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event_name == 'workflow_dispatch' && inputs.run_id || github.event.workflow_run.id }}

      - uses: actions/download-artifact@v4
        with:
          name: desktop-windows-latest
          path: win
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event_name == 'workflow_dispatch' && inputs.run_id || github.event.workflow_run.id }}

      - name: Assemble stable asset names
        env:
          DESKTOP_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.run_id || github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          mkdir -p dist
          MAC_ZIP="$(find mac -type f -name '*.zip' ! -path '*/node_modules/*' | head -n 1)"
          if [[ -z "$MAC_ZIP" ]]; then
            echo "No macOS .zip in desktop-macos-13 for run ${DESKTOP_RUN_ID}"
            find mac -type f 2>/dev/null | head -80 || true
            exit 1
          fi
          cp "$MAC_ZIP" dist/WeatherV1-macOS.zip
          WIN_EXE="$(find win -type f -name 'WeatherV1-Setup.exe' ! -path '*/node_modules/*' | head -n 1)"
          if [[ -z "$WIN_EXE" ]]; then
            WIN_EXE="$(find win -type f -path '*/squirrel.windows/*/*.exe' ! -path '*/node_modules/*' | head -n 1)"
          fi
          if [[ -z "$WIN_EXE" ]]; then
            echo "No Windows setup .exe in desktop-windows-latest for run ${DESKTOP_RUN_ID}"
            find win -type f 2>/dev/null | head -80 || true
            exit 1
          fi
          cp "$WIN_EXE" dist/WeatherV1-Setup.exe
          ls -la dist

      - name: Resolve release tag
        id: reltag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-}"
          TAGFILE=""
          if [[ -d meta ]]; then
            TAGFILE="$(find meta -type f -name tag 2>/dev/null | head -n 1 || true)"
          fi
          if [[ -n "$TAGFILE" ]]; then
            TAG="$(tr -d '\n\r ' < "$TAGFILE")"
          fi
          if [[ -z "$TAG" && -n "${HEAD_BRANCH:-}" ]]; then
            TAG="${HEAD_BRANCH#refs/tags/}"
          fi
          TAG="${TAG#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            echo "Could not resolve tag (release-ref and head_branch). head_branch=${HEAD_BRANCH:-<empty>}"
            exit 1
          fi
          echo "Resolved tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.reltag.outputs.tag }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: |
            dist/WeatherV1-macOS.zip
            dist/WeatherV1-Setup.exe
