name: Desktop

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  package:
    name: ${{ matrix.os }} package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      OSX_SIGN_IDENTITY: ${{ secrets.OSX_SIGN_IDENTITY }}
      WIN_CERT_FILE: ${{ secrets.WIN_CERT_FILE }}
      WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm test

      - name: Package unsigned desktop app
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run electron:build

      - name: Make release artifacts
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: npm run electron:make

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: desktop-${{ matrix.os }}
          path: |
            out/**
            !out/**/node_modules/**
          if-no-files-found: ignore

  release:
    name: Publish desktop release
    runs-on: ubuntu-latest
    needs: [package]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: desktop-macos-latest
          path: mac

      - uses: actions/download-artifact@v4
        with:
          name: desktop-windows-latest
          path: win

      - name: Assemble stable asset names
        run: |
          set -euo pipefail
          mkdir -p dist
          MAC_ZIP="$(find mac -type f -name '*.zip' ! -path '*/node_modules/*' | head -n 1)"
          if [[ -z "$MAC_ZIP" ]]; then
            echo "No macOS .zip under artifact tree"; find mac -type f 2>/dev/null | head -80 || true
            exit 1
          fi
          cp "$MAC_ZIP" dist/WeatherV1-macOS.zip
          WIN_EXE="$(find win -type f -name 'WeatherV1-Setup.exe' ! -path '*/node_modules/*' | head -n 1)"
          if [[ -z "$WIN_EXE" ]]; then
            WIN_EXE="$(find win -type f -path '*/squirrel.windows/*/*.exe' ! -path '*/node_modules/*' | head -n 1)"
          fi
          if [[ -z "$WIN_EXE" ]]; then
            echo "No Windows setup .exe under artifact tree"; find win -type f 2>/dev/null | head -80 || true
            exit 1
          fi
          cp "$WIN_EXE" dist/WeatherV1-Setup.exe
          ls -la dist

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/WeatherV1-macOS.zip
            dist/WeatherV1-Setup.exe
