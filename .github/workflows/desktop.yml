name: Desktop

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  package:
    name: ${{ matrix.os }} package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Force an x64 macOS build so the public ZIP opens on Intel Macs;
          # Apple Silicon can run it via Rosetta. This avoids long macos-13
          # Intel runner queues while still targeting Intel binaries.
          - os: macos-latest
            arch: x64
            artifact: desktop-macos-latest
          - os: windows-latest
            arch: x64
            artifact: desktop-windows-latest

    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      OSX_SIGN_IDENTITY: ${{ secrets.OSX_SIGN_IDENTITY }}
      WIN_CERT_FILE: ${{ secrets.WIN_CERT_FILE }}
      WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
      npm_config_arch: ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm test

      # Windows MAX_PATH = 260 chars trips Squirrel's NuGet packing on deep
      # transformers.js / onnxruntime trees. Enabling long-path support at
      # the OS + git layers is cheap insurance even though NuGet's own
      # System.IO calls don't always honor it.
      - name: Enable long path support (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null

      - name: Package unsigned desktop app
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run build && npm run standalone:prep && npx electron-forge package --arch=${{ matrix.arch }}

      # On macOS, output stays at the default `./out` so the upload step
      # below picks it up. On Windows we redirect to `C:\m` to chop ~35
      # chars off every staged file path; otherwise Squirrel's `.tmp\<guid>\
      # lib\net45\WeatherV1-win32-x64\resources\app.asar.unpacked\` prefix
      # plus onnxruntime-node's deep `bin/napi-v6/...` paths cross 260 chars.
      - name: Make release artifacts (macOS)
        if: ${{ startsWith(github.ref, 'refs/tags/') && runner.os == 'macOS' }}
        run: npm run build && npm run standalone:prep && npx electron-forge make --arch=${{ matrix.arch }}

      - name: Make release artifacts (Windows)
        if: ${{ startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows' }}
        shell: pwsh
        run: |
          npm run build
          npm run standalone:prep
          npx electron-forge make --arch=${{ matrix.arch }} --outDir=C:\m
          New-Item -ItemType Directory -Path out -Force | Out-Null
          Copy-Item -Recurse -Force C:\m\* out\

      # Canonical tag name for desktop-publish-release.yml (workflow_run exposes
      # github.event.workflow_run.head_branch as the tag for tag-triggered runs;
      # this file avoids edge cases where head_branch is empty).
      - name: Record tag for release workflow
        if: ${{ startsWith(github.ref, 'refs/tags/') && startsWith(matrix.os, 'macos-') }}
        run: mkdir -p .release && printf '%s\n' "${{ github.ref_name }}" > .release/tag

      - uses: actions/upload-artifact@v4
        if: ${{ startsWith(github.ref, 'refs/tags/') && startsWith(matrix.os, 'macos-') }}
        with:
          name: release-ref
          path: .release/tag

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.artifact }}
          path: |
            out/**
            !out/**/node_modules/**
          if-no-files-found: ignore
