name: Desktop

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/workflows/pitch-deck.yml"
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/workflows/pitch-deck.yml"

jobs:
  package:
    name: ${{ matrix.os }} package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
            artifact: desktop-windows-latest

    env:
      WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
      # Plaintext editor/admin gate passwords. The prebuild step
      # (scripts/emit-auth-hashes.cjs) hashes them into the gitignored
      # auth-passwords.generated.ts. The script never echoes the value
      # or the derived hash — GitHub masks raw secrets but not values
      # derived from them.
      EDITOR_PASSWORD: ${{ secrets.EDITOR_PASSWORD }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      npm_config_arch: ${{ matrix.arch }}
      # WIN_CERT_FILE is *not* set here. The "Decode Windows signing cert"
      # step writes it to $GITHUB_ENV from the WIN_CERTIFICATE_BASE64 secret
      # so forge.config.cjs receives a real on-disk .pfx path. APPLE_* /
      # OSX_SIGN_IDENTITY are intentionally not exported here either:
      # the matrix only builds Windows. Restore them when macOS returns
      # to CI (the secrets stay defined in the repo for that day).

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm test

      # Decode WIN_CERTIFICATE_BASE64 → on-disk .pfx; forge.config.cjs wants
      # a path. Code-signing is OPTIONAL: if WIN_CERTIFICATE_BASE64 is not
      # configured this step is skipped and forge.config.cjs falls back to
      # building an unsigned installer (haveWinSigning gate at line ~44).
      # Until a code-signing cert is purchased, every public release is
      # unsigned and users see a one-time SmartScreen "unknown publisher"
      # warning.
      - name: Decode Windows signing cert
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: pwsh
        env:
          WIN_CERTIFICATE_BASE64: ${{ secrets.WIN_CERTIFICATE_BASE64 }}
        run: |
          # Secret-presence check lives inside the script (not in step-level
          # `if:`) because GitHub Actions blocks `secrets.X != ''` in if
          # expressions to prevent timing oracles.
          if ([string]::IsNullOrWhiteSpace($env:WIN_CERTIFICATE_BASE64)) {
            Write-Host "WIN_CERTIFICATE_BASE64 not set — skipping cert decode, will package unsigned."
            exit 0
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "win-cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WIN_CERTIFICATE_BASE64))
          # utf8NoBOM: $GITHUB_ENV is parsed line-by-line and tolerates BOM only
          # at file start; appending a BOM mid-file silently drops the variable.
          "WIN_CERT_FILE=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8NoBOM

      # Fail loud if any required release secret is missing. EDITOR_PASSWORD
      # and ADMIN_PASSWORD are non-negotiable on every tag (prebuild fails
      # without them). The Windows signing pair is only required when the
      # cert was provided — partial signing config (cert without password
      # or vice versa) is treated as a misconfiguration.
      - name: Assert required release secrets
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        shell: pwsh
        run: |
          $missing = @()
          foreach ($name in 'EDITOR_PASSWORD','ADMIN_PASSWORD') {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              $missing += $name
            }
          }
          $certFile = [Environment]::GetEnvironmentVariable('WIN_CERT_FILE')
          $certPwd  = [Environment]::GetEnvironmentVariable('WIN_CERT_PASSWORD')
          $haveCertFile = -not [string]::IsNullOrWhiteSpace($certFile)
          $havePwd      = -not [string]::IsNullOrWhiteSpace($certPwd)
          if ($haveCertFile -ne $havePwd) {
            $missing += if ($haveCertFile) { 'WIN_CERT_PASSWORD' } else { 'WIN_CERT_FILE (decoded from WIN_CERTIFICATE_BASE64)' }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Tag build missing required secrets: $($missing -join ', ')"
            exit 1
          }
          if (-not $haveCertFile) {
            Write-Host "::warning::WIN_CERTIFICATE_BASE64 not configured — packaging UNSIGNED installer. SmartScreen will warn on first install."
          }

      - name: Package unsigned desktop app
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run build && npm run standalone:prep && npx electron-forge package --arch=${{ matrix.arch }}

      - name: Make release artifacts
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: npm run build && npm run standalone:prep && npx electron-forge make --arch=${{ matrix.arch }}

      # Canonical tag name for desktop-publish-release.yml (workflow_run exposes
      # github.event.workflow_run.head_branch as the tag for tag-triggered runs;
      # this file avoids edge cases where head_branch is empty).
      - name: Record tag for release workflow
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: mkdir -p .release && printf '%s\n' "${{ github.ref_name }}" > .release/tag

      # Short retention: tag-triggered artifacts are consumed by
      # desktop-publish-release.yml within minutes (attached to the GitHub
      # Release); non-tag artifacts are only useful for CI debugging. Keeping
      # them around fills the account-wide Actions storage quota.
      - uses: actions/upload-artifact@v6
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          name: release-ref
          path: .release/tag
          retention-days: 7

      - uses: actions/upload-artifact@v6
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          name: ${{ matrix.artifact }}
          path: |
            out/**
            !out/**/node_modules/**
          if-no-files-found: ignore
          retention-days: 7
