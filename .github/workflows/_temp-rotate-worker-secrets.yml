name: temp-rotate-worker-secrets
on:
  workflow_dispatch: {}
jobs:
  rotate:
    runs-on: ubuntu-latest
    env:
      CF_ACCOUNT_ID: f73ae3550198c571ad20f9fd06632200
      SCRIPT_NAME: weatherv1-r2-gateway
    steps:
      - name: Update Worker secret bindings via Cloudflare API
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NEW_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NEW_R2_PARENT: ${{ secrets.R2_ACCESS_KEY_ID }}
        run: |
          set -euo pipefail
          BASE="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/workers/scripts/$SCRIPT_NAME/secrets"
          for pair in "CLOUDFLARE_API_TOKEN:$NEW_CF_TOKEN" "R2_PARENT_ACCESS_KEY_ID:$NEW_R2_PARENT"; do
            NAME="${pair%%:*}"
            VAL="${pair#*:}"
            echo "putting secret $NAME"
            RESP=$(curl -sS -w '\n%{http_code}' -X PUT "$BASE" \
              -H "authorization: Bearer $CF_TOKEN" \
              -H "content-type: application/json" \
              --data "$(jq -nc --arg n "$NAME" --arg t "$VAL" '{name:$n,text:$t,type:"secret_text"}')")
            CODE=$(printf '%s' "$RESP" | tail -n1)
            BODY=$(printf '%s' "$RESP" | sed '$d')
            echo "  http=$CODE"
            echo "$BODY" | jq -c '{success, errors}' || true
            if [ "$CODE" != "200" ]; then
              exit 1
            fi
          done
      - name: Verify Worker temp-creds endpoint
        run: |
          set -euo pipefail
          curl -sS -o /tmp/r.json -w '%{http_code}\n' \
            -u "v1editor:yallabeitar" \
            -X POST -H 'content-type: application/json' \
            -d '{"tenantId":"default"}' \
            https://weatherv1-r2-gateway.barprojectsandbuilds.workers.dev/v1/r2/temporary-credentials
          jq '. | {success, error, hasAccessKey: (.accessKeyId != null)}' /tmp/r.json
