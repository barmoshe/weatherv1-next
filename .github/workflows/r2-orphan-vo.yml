name: R2 orphan voiceover cleanup

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "type 'yes' to actually delete"
        required: false
        default: "no"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_R2_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess, sys, urllib.request
          tok = os.environ['CLOUDFLARE_API_TOKEN']
          acct = os.environ['CLOUDFLARE_ACCOUNT_ID']
          bucket = 'weatherv1-media'
          confirm = os.environ['CONFIRM']

          def cf(path):
              req = urllib.request.Request(
                  f"https://api.cloudflare.com/client/v4/accounts/{acct}/r2/buckets/{bucket}{path}",
                  headers={'Authorization': f'Bearer {tok}'},
              )
              with urllib.request.urlopen(req) as r:
                  return r.read()

          # 1. Fetch jobs.json
          jobs_raw = cf('/objects/tenants/default/jobs/jobs.json').decode()
          jobs = json.loads(jobs_raw)
          # accept either {jobs: [...]} or [...]
          job_records = jobs.get('jobs') if isinstance(jobs, dict) and 'jobs' in jobs else jobs
          if not isinstance(job_records, list):
              # try other common shapes
              job_records = list(jobs.values()) if isinstance(jobs, dict) else []
          known_ids = set()
          for r in job_records:
              if isinstance(r, dict):
                  for k in ('id', 'jobId', 'job_id'):
                      if r.get(k):
                          known_ids.add(r[k]); break
              elif isinstance(r, str):
                  known_ids.add(r)
          print(f"jobs.json: {len(job_records)} records, {len(known_ids)} ids extracted")
          print("known ids:", sorted(known_ids))

          # 2. List voiceover prefix
          data = json.loads(cf('/objects?per_page=1000&prefix=tenants/default/voiceovers/'))
          vo_objs = data.get('result') or []
          vo_by_id = {}
          for o in vo_objs:
              # key: tenants/default/voiceovers/<jobId>/<file>
              parts = o['key'].split('/')
              if len(parts) >= 4:
                  vo_by_id.setdefault(parts[3], []).append(o)
          print(f"\nvoiceovers/: {len(vo_objs)} objects across {len(vo_by_id)} jobIds")

          orphans = sorted(set(vo_by_id) - known_ids)
          referenced = sorted(set(vo_by_id) & known_ids)
          print(f"\nreferenced jobIds ({len(referenced)}): {referenced}")
          print(f"orphan jobIds ({len(orphans)}):")
          orphan_objs = []
          total_bytes = 0
          for jid in orphans:
              for o in vo_by_id[jid]:
                  orphan_objs.append(o)
                  total_bytes += o['size']
                  print(f"  {o['size']:>10,}  {o['key']}")
          print(f"\nwould delete {len(orphan_objs)} objects, {total_bytes:,} bytes")

          if confirm != 'yes':
              print("\nconfirm != 'yes'; dry run only.")
              sys.exit(0)

          for o in orphan_objs:
              print(f"DELETE {o['key']}")
              r = subprocess.run(
                  ['npx', '-y', 'wrangler@latest', 'r2', 'object', 'delete', f"{bucket}/{o['key']}", '--remote'],
                  env={**os.environ}, capture_output=True, text=True,
              )
              print(r.stdout.strip())
              if r.returncode != 0:
                  print(r.stderr, file=sys.stderr); sys.exit(r.returncode)
          print(f"\ndeleted {len(orphan_objs)} objects.")
          PY
