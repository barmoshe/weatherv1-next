name: R2 orphan voiceover cleanup

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "type 'yes' to actually delete"
        required: false
        default: "no"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          BUCKET=weatherv1-media

          echo "== fetch jobs.json =="
          aws s3api get-object --bucket "$BUCKET" \
            --key tenants/default/jobs/jobs.json \
            --endpoint-url "$R2_ENDPOINT" /tmp/jobs.json > /dev/null

          echo "== list voiceovers/ =="
          aws s3api list-objects-v2 --bucket "$BUCKET" \
            --prefix tenants/default/voiceovers/ \
            --endpoint-url "$R2_ENDPOINT" > /tmp/vo.json

          python3 - <<'PY'
          import json, os, subprocess, sys
          jobs = json.load(open('/tmp/jobs.json'))
          recs = jobs.get('jobs') if isinstance(jobs, dict) and 'jobs' in jobs else jobs
          if not isinstance(recs, list):
              recs = list(jobs.values()) if isinstance(jobs, dict) else []
          known = set()
          for r in recs:
              if isinstance(r, dict):
                  for k in ('id','jobId','job_id'):
                      if r.get(k): known.add(r[k]); break
              elif isinstance(r, str):
                  known.add(r)
          print(f"jobs.json: {len(recs)} records, {len(known)} ids")
          print("known:", sorted(known))

          vo = json.load(open('/tmp/vo.json')).get('Contents') or []
          by_id = {}
          for o in vo:
              parts = o['Key'].split('/')
              if len(parts) >= 4:
                  by_id.setdefault(parts[3], []).append(o)
          print(f"\nvoiceovers/: {len(vo)} objects across {len(by_id)} jobIds")

          orphans = sorted(set(by_id) - known)
          referenced = sorted(set(by_id) & known)
          print(f"\nreferenced ({len(referenced)}): {referenced}")
          print(f"orphans ({len(orphans)}):")
          to_delete, total = [], 0
          for jid in orphans:
              for o in by_id[jid]:
                  to_delete.append(o['Key']); total += o['Size']
                  print(f"  {o['Size']:>10,}  {o['Key']}")
          print(f"\nwould delete {len(to_delete)} objects, {total:,} bytes")

          if os.environ['CONFIRM'] != 'yes':
              print("\nconfirm != 'yes'; dry run only.")
              sys.exit(0)

          if not to_delete:
              sys.exit(0)
          # Batch delete (S3 supports up to 1000 per call)
          payload = {"Objects": [{"Key": k} for k in to_delete], "Quiet": True}
          json.dump(payload, open('/tmp/del.json','w'))
          r = subprocess.run(
              ['aws','s3api','delete-objects',
               '--bucket', os.environ.get('BUCKET','weatherv1-media'),
               '--delete', 'file:///tmp/del.json',
               '--endpoint-url', os.environ['R2_ENDPOINT']],
              capture_output=True, text=True,
          )
          print(r.stdout); print(r.stderr, file=sys.stderr)
          sys.exit(r.returncode)
          PY
