name: R2 bucket inventory

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_R2_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/r2/buckets/weatherv1-media/objects?per_page=1000" \
            > /tmp/r2.json
          python3 - <<'PY'
          import json
          d = json.load(open('/tmp/r2.json'))
          objs = d.get('result') or []
          print(f"TOTAL {len(objs)} {sum(o['size'] for o in objs)}")
          for o in sorted(objs, key=lambda x: x['key']):
              print(f"{o['size']} {o['key']}")
          PY
