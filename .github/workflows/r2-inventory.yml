name: R2 bucket inventory

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: "Optional key prefix"
        required: false
        default: ""

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: List bucket
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_R2_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PREFIX: ${{ inputs.prefix }}
        run: |
          echo "## bucket list (token's view)"
          npx -y wrangler@latest r2 bucket list || true
          echo
          echo "## bucket info: weatherv1-media"
          npx -y wrangler@latest r2 bucket info weatherv1-media || true
          echo
          echo "## REST list_objects_v2 via Cloudflare API gateway"
          # Cloudflare API exposes a list endpoint at:
          #   /accounts/{id}/r2/buckets/{name}/objects
          curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/r2/buckets/weatherv1-media/objects?per_page=1000${PREFIX:+&prefix=$PREFIX}" \
            | python3 -m json.tool | head -200
