name: R2 bucket inventory

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: "Optional key prefix"
        required: false
        default: ""

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: List bucket
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_R2_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PREFIX: ${{ inputs.prefix }}
        run: |
          npx -y wrangler@latest r2 bucket info weatherv1-media || true
          echo "---"
          if [ -n "$PREFIX" ]; then
            npx -y wrangler@latest r2 object list weatherv1-media --prefix "$PREFIX" --per-page 1000
          else
            npx -y wrangler@latest r2 object list weatherv1-media --per-page 1000
          fi
