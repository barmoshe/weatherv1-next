<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Weather V1 — מחולל תחזית לווידאו אנכי: קריינות, תמלול, תוכנית סצנות, התאמת סגמנטים מהקטלוג ורינדור.">
  <title>Weather V1 — מצגת פתיחה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Heebo:wght@100..900&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      color-scheme: light;
      --v1-red: #ff0000;
      --v1-coral: #f9543e;
      --v1-coral-soft: #fce9e4;
      --v1-cream: #f4f3ef;
      --v1-paper: #ffffff;
      --v1-ink: #000000;
      --v1-muted: #313131;
      --v1-yellow: #f2c231;
      --v1-success: #1fa871;
      --v1-danger: #c8202b;
      --shadow: 8px 8px 0 var(--v1-ink);
      --soft-shadow: 0 18px 46px rgb(0 0 0 / .12);
      --nav-height: 76px;
      /* Mobile pitch tier overrides `--nav-height` + exposes rhythm for panels / anchors */
      --pitch-mobile-nav-buffer: 12px;
      --story-vw: 100vw;
      /* One viewport-tall slide frame across the pitch (#storyRoll panels / subslides). */
      --story-slide-h: 100svh;
      font-family: Heebo, "Segoe UI", "Segoe UI Historic", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .pitch-mobile-desktop-cta {
      display: none;
    }

    * { box-sizing: border-box; }
    html {
      min-height: 100%;
      scroll-behavior: smooth;
      background: var(--v1-cream);
      overflow-anchor: none;
    }
    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      background:
        linear-gradient(90deg, rgb(0 0 0 / .035) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(0deg, rgb(0 0 0 / .03) 1px, transparent 1px) 0 0 / 28px 28px,
        radial-gradient(circle at 12% 18%, rgb(242 194 49 / .26), transparent 30rem),
        radial-gradient(circle at 86% 68%, rgb(249 84 62 / .18), transparent 36rem),
        var(--v1-cream);
      color: var(--v1-ink);
      font: 16px/1.55 Heebo, "Segoe UI", "Segoe UI Historic", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      text-rendering: optimizeLegibility;
    }

    a { color: inherit; }

    .site-nav {
      position: fixed;
      inset: 12px 12px auto;
      z-index: 50;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 8px 10px;
      border: 2px solid var(--v1-ink);
      border-radius: 18px;
      background: rgb(249 84 62 / .96);
      box-shadow: 5px 5px 0 var(--v1-ink);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      text-decoration: none;
      font-weight: 900;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 2px solid var(--v1-ink);
      border-radius: 10px;
      background: var(--v1-paper);
      box-shadow: 3px 3px 0 var(--v1-ink);
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand-copy {
      display: grid;
      gap: 1px;
      line-height: 1.05;
    }

    .brand-copy strong {
      white-space: nowrap;
      font-size: 1rem;
    }

    .brand-copy span {
      color: rgb(0 0 0 / .7);
      font-size: .78rem;
      font-weight: 800;
    }

    .nav-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-link,
    .cta {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      border: 1.5px solid var(--v1-ink);
      border-radius: 12px;
      background: rgb(255 255 255 / .78);
      color: var(--v1-ink);
      box-shadow: 2px 2px 0 var(--v1-ink);
      text-decoration: none;
      font-weight: 900;
      white-space: nowrap;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .cta {
      background: var(--v1-red);
      color: #fff;
    }

    .nav-link:hover,
    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 3px 3px 0 var(--v1-ink);
      background: var(--v1-yellow);
      color: var(--v1-ink);
    }

    .scroll-progress {
      position: fixed;
      inset: auto 18px 14px;
      z-index: 45;
      height: 8px;
      overflow: hidden;
      border: 1.5px solid var(--v1-ink);
      border-radius: 999px;
      background: rgb(255 255 255 / .82);
      box-shadow: 2px 2px 0 var(--v1-ink);
    }

    .scroll-progress span {
      display: block;
      position: absolute;
      inset: 0;
      width: auto;
      height: 100%;
      transform: scaleX(0);
      transform-origin: inline-start;
      background: linear-gradient(90deg, var(--v1-yellow), var(--v1-red));
      will-change: transform;
    }

    .scroll-hint {
      position: fixed;
      inset-inline-start: 18px;
      inset-inline-end: auto;
      inset-block-end: 78px;
      z-index: 46;
      transform: translateY(-100%);
      color: var(--v1-muted);
      font-size: .78rem;
      font-weight: 900;
      pointer-events: none;
      white-space: nowrap;
    }

    .pitch-step-nav {
      position: fixed;
      inset-inline-end: max(14px, env(safe-area-inset-inline-end, 0px));
      inset-inline-start: auto;
      bottom: calc(max(1rem, env(safe-area-inset-bottom, 0px), 8px) + 3.25rem);
      z-index: 48;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 7px;
      padding: 9px;
      border: 2px solid var(--v1-ink);
      border-radius: 16px;
      background: rgb(255 255 255 / 0.94);
      box-shadow: 4px 4px 0 var(--v1-ink);
      backdrop-filter: blur(14px) saturate(1.15);
      -webkit-backdrop-filter: blur(14px) saturate(1.15);
    }

    .pitch-step-nav button {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      margin: 0;
      padding: 0;
      border: 2px solid var(--v1-ink);
      border-radius: 11px;
      background: linear-gradient(165deg, rgb(255 255 255 / 1) 0%, rgb(252 252 252 / 1) 55%, rgb(248 248 249 / 1) 100%);
      color: var(--v1-ink);
      box-shadow: 2px 2px 0 rgb(0 0 0 / 0.14);
      cursor: pointer;
      transition:
        transform 160ms ease,
        background 160ms ease,
        box-shadow 160ms ease,
        border-color 160ms ease;
    }

    .pitch-step-nav button .pitch-step-icon {
      display: block;
      flex-shrink: 0;
    }

    #pitch-step-down {
      background: linear-gradient(
        165deg,
        rgb(255 255 255 / 1) 0%,
        rgb(255 247 243 / 1) 48%,
        rgb(252 233 228 / 0.92) 100%
      );
    }

    .pitch-step-nav button:hover,
    .pitch-step-nav button:focus-visible {
      background: var(--v1-yellow);
      border-color: var(--v1-ink);
      box-shadow: 3px 3px 0 var(--v1-ink);
      outline: none;
      transform: translateY(-2px);
    }

    #pitch-step-down:hover,
    #pitch-step-down:focus-visible {
      background: linear-gradient(165deg, var(--v1-yellow), rgb(250 210 75 / 1));
    }

    .pitch-step-nav button:focus-visible {
      outline: 3px solid var(--v1-paper);
      outline-offset: 3px;
    }

    .pitch-step-nav button:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 1px 1px 0 var(--v1-ink);
    }

    .pitch-step-nav button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
      box-shadow: 2px 2px 0 rgb(0 0 0 / 0.1);
    }

    .pitch-step-nav button:disabled:hover,
    .pitch-step-nav button:disabled:focus-visible {
      background: linear-gradient(165deg, rgb(255 255 255 / 1) 0%, rgb(252 252 252 / 1) 100%);
      transform: none;
      box-shadow: 2px 2px 0 rgb(0 0 0 / 0.1);
      outline: none;
    }

    #pitch-step-down:disabled:hover,
    #pitch-step-down:disabled:focus-visible {
      background: linear-gradient(
        165deg,
        rgb(255 255 255 / 1) 0%,
        rgb(255 247 243 / 1) 48%,
        rgb(252 233 228 / 0.92) 100%
      );
    }

    .story-shell {
      min-height: var(--story-slide-h);
      overflow: hidden;
      /* Avoid scroll anchoring jumps when pinned strip height/measures settle. */
      overflow-anchor: none;
    }

    /**
     * Story pin + GSAP scrub: isolate geometry to LTR. `html[dir=rtl]` with ScrollTrigger
     * horizontal maps is brittle (community reports misaligned scrub / anchors); copy stays rtl in .panel-inner.
     */
    main#story {
      direction: ltr;
      unicode-bidi: isolate;
    }

    .story-track {
      display: block;
      width: 100%;
      min-height: var(--story-slide-h);
    }

    .story-mirror {
      width: 100%;
      min-height: 100%;
    }

    .story-roll {
      display: block;
      width: 100%;
      min-height: var(--story-slide-h);
    }

    /*
      Horizontal carousel: physical LTR flex on #storyRoll + GSAP translateX.
      main#story stays direction:ltr for ScrollTrigger math; body.scroll-rtlflow mirrors strip+panels for RTL story feel.
      Typography remains rtl in .panel-inner.
    */

    .story-panel {
      width: 100%;
      box-sizing: border-box;
      height: var(--story-slide-h);
      max-height: var(--story-slide-h);
      min-height: var(--story-slide-h);
      overflow: hidden;
      padding: calc(var(--nav-height) + 36px) clamp(20px, 5vw, 72px) 64px;
      display: grid;
      align-items: stretch;
      justify-items: center;
      background:
        linear-gradient(90deg, rgb(0 0 0 / .028) 1px, transparent 1px) 0 0 / 34px 34px,
        linear-gradient(0deg, rgb(0 0 0 / .022) 1px, transparent 1px) 0 0 / 34px 34px,
        var(--panel-paper, var(--v1-paper));
    }

    .panel-inner {
      width: min(1180px, 100%);
      height: 100%;
      max-height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, .9fr) minmax(320px, 1.1fr);
      gap: clamp(24px, 5vw, 78px);
      align-items: stretch;
      direction: rtl;
      unicode-bidi: isolate;
    }

    /**
     * Per-slide layout presets (`data-panel-layout` on `.story-panel`, optionally `.story-subslide`).
     * Desktop (861px+): asymmetric splits / stacked visual-first; mobile: existing `.panel-inner` single column.
     */
    @media (min-width: 861px) {
      .story-panel[data-panel-layout="split-balanced"] .panel-inner,
      .story-subslide[data-panel-layout="split-balanced"] .panel-inner {
        grid-template-columns: minmax(0, 0.85fr) minmax(320px, 1.15fr);
      }

      .story-panel[data-panel-layout="split-visual-heavy"] .panel-inner,
      .story-subslide[data-panel-layout="split-visual-heavy"] .panel-inner {
        grid-template-columns: minmax(0, 0.68fr) minmax(300px, 1.32fr);
      }

      .story-panel[data-panel-layout="split-copy-heavy"] .panel-inner,
      .story-subslide[data-panel-layout="split-copy-heavy"] .panel-inner {
        grid-template-columns: minmax(0, 1.08fr) minmax(260px, 0.92fr);
      }

      .story-panel[data-panel-layout="split-flip"] .panel-inner,
      .story-subslide[data-panel-layout="split-flip"] .panel-inner {
        grid-template-columns: minmax(0, 0.85fr) minmax(320px, 1.15fr);
      }

      .story-panel[data-panel-layout="split-flip"] .panel-copy,
      .story-subslide[data-panel-layout="split-flip"] .panel-copy {
        grid-column: 2;
      }

      .story-panel[data-panel-layout="split-flip"] .panel-visual,
      .story-subslide[data-panel-layout="split-flip"] .panel-visual {
        grid-column: 1;
      }

      .story-panel[data-panel-layout^="split-"] .panel-visual,
      .story-subslide[data-panel-layout^="split-"] .panel-visual {
        align-self: stretch;
      }

      /* Catalog split: same lane height as copy, but vertically center screenshot + tag CTA beside the text. */
      #catalog[data-panel-layout^="split-"] .panel-visual {
        place-items: center stretch;
      }

      /* Split lanes share one row; visual column fills allocated height (no drifting min-heights per slide). */
      .story-panel[data-panel-layout^="split-"] .panel-inner,
      .story-subslide[data-panel-layout^="split-"] .panel-inner {
        grid-template-rows: minmax(0, 1fr);
      }

      .panel-mobile-summary,
      .panel-mobile-bullets {
        display: none !important;
      }
    }

    .story-panel[data-panel-layout="stack-visual-top"] .panel-inner,
    .story-subslide[data-panel-layout="stack-visual-top"] .panel-inner {
      grid-template-columns: 1fr;
      grid-template-rows: minmax(34svh, 0.55fr) minmax(0, 1fr);
      gap: clamp(14px, 2.8vw, 36px);
      align-items: stretch;
    }

    .story-panel[data-panel-layout="stack-visual-top"] .panel-visual,
    .story-subslide[data-panel-layout="stack-visual-top"] .panel-visual {
      grid-row: 1;
      grid-column: 1;
      width: 100%;
      min-height: 0;
      align-self: stretch;
      justify-self: stretch;
    }

    .story-panel[data-panel-layout="stack-visual-top"] .panel-copy,
    .story-subslide[data-panel-layout="stack-visual-top"] .panel-copy {
      grid-row: 2;
      grid-column: 1;
      max-width: min(48rem, 100%);
      justify-self: center;
      width: 100%;
      min-height: 0;
      align-self: stretch;
    }

    .panel-copy {
      min-width: 0;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      display: grid;
      gap: 18px;
      justify-items: start;
      align-content: start;
    }

    .kicker {
      display: inline-block;
      max-width: 100%;
      border-inline-start: 4px solid currentColor;
      padding-inline-start: 12px;
      color: var(--panel-accent, var(--v1-coral));
      font-size: clamp(.78rem, 1.2vw, .95rem);
      font-weight: 950;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    h1, h2 {
      margin: 0;
      max-width: 10.5ch;
      color: var(--v1-ink);
      font-size: clamp(3rem, 7vw, 7.4rem);
      line-height: .9;
      letter-spacing: 0;
      text-align: start;
    }

    .lead {
      max-width: 34rem;
      margin: 0;
      color: var(--v1-muted);
      font-size: clamp(1.05rem, 1.8vw, 1.55rem);
      font-weight: 700;
      line-height: 1.35;
    }

    .bullets {
      margin: 8px 0 0;
      padding: 0;
      display: grid;
      gap: 10px;
      list-style: none;
      font-weight: 850;
      font-size: clamp(.95rem, 1.35vw, 1.15rem);
    }

    .bullets li {
      display: grid;
      grid-template-columns: 10px 1fr;
      gap: 10px;
      align-items: start;
    }

    .bullets li::before {
      content: "";
      width: 10px;
      height: 10px;
      margin-top: .52em;
      margin-inline: auto;
      border-radius: 999px;
      background: var(--panel-accent, var(--v1-coral));
      box-shadow: 0 0 0 5px rgb(249 84 62 / .14);
    }

    /* English / Latin snippets inside rtl panels */

    .mixed-ltr {
      direction: ltr;
      unicode-bidi: isolate;
    }

    .panel-visual {
      position: relative;
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .numbered-sample-visual {
      width: min(100%, 520px);
      min-height: min(52svh, 420px);
      border: 3px solid var(--v1-ink);
      border-radius: 24px;
      background: rgb(255 255 255 / .78);
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .numbered-sample-num {
      font-size: clamp(4rem, 22vmin, 9.5rem);
      font-weight: 950;
      line-height: 1;
      color: var(--panel-accent, var(--v1-coral));
      letter-spacing: -0.06em;
      font-variant-numeric: tabular-nums;
      user-select: none;
    }

    /*
      Product-app pitch layout (studio now; reuse shell + bento for catalog slide later).
      Hooks: [data-pitch-layout="product-app"], .pitch-app-shell, .pitch-bento, .pitch-drop-card
    */
    [data-pitch-layout="product-app"] .panel-copy {
      gap: clamp(12px, 2vw, 18px);
    }

    [data-pitch-layout="product-app"] .kicker {
      font-size: clamp(0.62rem, 0.95vw, 0.76rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-inline-start-width: 3px;
      padding-inline-start: 10px;
    }

    [data-pitch-layout="product-app"] h2 {
      max-width: min(40ch, 100%);
      font-size: clamp(1.28rem, 2.1vw + 0.45rem, 2.28rem);
      line-height: 1.12;
      letter-spacing: -0.03em;
      font-weight: 820;
    }

    [data-pitch-layout="product-app"] .pitch-lead-well {
      margin: 2px 0 0;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgb(0 0 0 / 0.08);
      background: linear-gradient(145deg, rgb(255 255 255 / 0.96), rgb(252 241 238 / 0.65));
      box-shadow: 0 1px 0 rgb(255 255 255 / 0.85) inset;
    }

    [data-pitch-layout="product-app"] .pitch-lead-well .lead {
      margin: 0;
      max-width: none;
      font-size: clamp(0.84rem, 1.12vw + 0.22rem, 1.02rem);
      line-height: 1.52;
      font-weight: 620;
      color: rgb(55 58 68 / 1);
    }

    [data-pitch-layout="product-app"] .bullets {
      margin: 6px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
      counter-reset: pitch-step;
    }

    [data-pitch-layout="product-app"] .bullets li {
      counter-increment: pitch-step;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 11px;
      align-items: start;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgb(0 0 0 / 0.07);
      background: rgb(255 255 255 / 0.78);
      box-shadow: 0 1px 2px rgb(0 0 0 / 0.04);
      font-size: clamp(0.76rem, 1vw, 0.9rem);
      font-weight: 760;
      color: rgb(66 68 78 / 1);
      transition:
        border-color 0.22s ease,
        box-shadow 0.22s ease,
        background 0.22s ease,
        color 0.22s ease;
    }

    [data-pitch-layout="product-app"] .bullets li::before {
      content: counter(pitch-step, decimal-leading-zero);
      width: auto;
      height: auto;
      margin: 0;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 0.59rem;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
      background: rgb(252 236 232 / 1);
      color: var(--panel-accent, var(--v1-coral));
      border: 1px solid rgb(0 0 0 / 0.08);
      box-shadow: none;
    }

    [data-pitch-layout="product-app"] .bullets li.is-wizard-active {
      border-color: color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 42%, rgb(0 0 0 / 0.14));
      background: color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 9%, rgb(255 255 255 / 0.96));
      color: var(--v1-ink);
      font-weight: 830;
      box-shadow: 0 2px 10px rgb(200 32 43 / 0.08);
    }

    [data-pitch-layout="product-app"] .bullets--studio-wizard li.is-wizard-active::before {
      background: var(--panel-accent, var(--v1-coral));
      color: #fff;
      border-color: rgb(0 0 0 / 0.12);
    }

    #studio .bullets--studio-wizard li[data-studio-phase-bullet] {
      cursor: pointer;
    }

    #studio .bullets--studio-wizard li[data-studio-phase-bullet]:focus-visible {
      outline: 2px solid var(--panel-accent, var(--v1-coral));
      outline-offset: 3px;
    }

    [data-pitch-layout="product-app"] .bullets--studio-wizard li.is-studio-phase-complete {
      border-color: color-mix(in srgb, rgb(22 163 91 / 1) 32%, rgb(0 0 0 / 0.1));
      background: color-mix(in srgb, rgb(22 163 91 / 1) 6%, rgb(255 255 255 / 0.94));
    }

    [data-pitch-layout="product-app"] .bullets--studio-wizard li.is-studio-phase-complete::before {
      background: color-mix(in srgb, rgb(22 163 91 / 1) 88%, rgb(255 255 255 / 0.12));
      color: #fff;
      border-color: rgb(0 0 0 / 0.1);
    }

    #catalog .bullets--catalog-wizard li[data-catalog-phase-bullet] {
      cursor: pointer;
    }

    #catalog .bullets--catalog-wizard li[data-catalog-phase-bullet]:focus-visible {
      outline: 2px solid var(--panel-accent, #3d55b8);
      outline-offset: 3px;
    }

    [data-pitch-layout="product-app"] .bullets--catalog-wizard li.is-wizard-active::before {
      background: var(--panel-accent, #3d55b8);
      color: #fff;
      border-color: rgb(0 0 0 / 0.12);
    }

    [data-pitch-layout="product-app"] .bullets--catalog-wizard li.is-catalog-phase-complete {
      border-color: color-mix(in srgb, rgb(22 163 91 / 1) 32%, rgb(0 0 0 / 0.1));
      background: color-mix(in srgb, rgb(22 163 91 / 1) 6%, rgb(255 255 255 / 0.94));
    }

    [data-pitch-layout="product-app"] .bullets--catalog-wizard li.is-catalog-phase-complete::before {
      background: color-mix(in srgb, rgb(22 163 91 / 1) 88%, rgb(255 255 255 / 0.12));
      color: #fff;
      border-color: rgb(0 0 0 / 0.1);
    }

    [data-pitch-layout="product-app"] .panel-visual {
      place-items: stretch;
      justify-items: stretch;
      align-content: stretch;
    }

    .pitch-app-main {
      padding: 12px 14px 16px;

      gap: 11px;
    }

    .pitch-app-tabs {

      flex-wrap: wrap;
      gap: 2px 6px;
      border-bottom: 1px solid rgb(0 0 0 / 0.08);

    .pitch-app-tab {
      padding: 8px 10px 6px;

    .pitch-app-tab-badge {

      align-items: center;

    .pitch-job-row {

      justify-content: space-between;

      flex-wrap: wrap;

    .pitch-job-chip {

      font-weight: 850;

      background: rgb(245 243 238 / 1);
      border: 1px solid rgb(0 0 0 / 0.08);
      color: rgb(82 84 94 / 1);

    .pitch-job-state {
      font-size: 0.58rem;
      font-weight: 850;
      color: var(--panel-accent, var(--v1-coral));

    .pitch-drop-card {
      display: flex;
      align-items: center;

      gap: 14px;
      flex-wrap: wrap;
      padding: 13px 15px;
      border-radius: 14px;
      border: 2px dashed color-mix(in srgb, var(--panel-accent, var(--v1-red)) 48%, rgb(0 0 0 / 0.12));
      background: linear-gradient(
        125deg,
        rgb(255 255 255 / 1),
        color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 7%, rgb(255 255 255 / 1))

    .pitch-drop-inner {

      gap: 12px;
      min-width: 0;

    .pitch-drop-icon {

      height: 46px;
      flex-shrink: 0;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 1.18rem;
      background: color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 14%, rgb(255 255 255 / 1));
      border: 1px solid rgb(0 0 0 / 0.07);

    .pitch-drop-title {
      font-size: 0.82rem;
      font-weight: 900;
      color: var(--v1-ink);
      margin-bottom: 3px;
    }

    .pitch-drop-hint {
      font-size: 0.69rem;
      font-weight: 700;
      color: rgb(105 106 118 / 1);
      line-height: 1.38;
      max-width: 30ch;

    .pitch-drop-cta {
      flex-shrink: 0;
      padding: 10px 17px;
      border-radius: 11px;
      border: none;
      font-size: 0.74rem;
      font-weight: 950;
      color: #fff;
      background: linear-gradient(180deg, rgb(232 56 48 / 1), rgb(190 36 38 / 1));
      box-shadow: 0 3px 12px rgb(200 32 43 / 0.28);
      cursor: default;
    }

    .pitch-bento {
      display: grid;
      gap: 10px;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.15fr) minmax(0, 0.88fr);
      align-items: stretch;
      min-height: 196px;
    }

    .pitch-bento__rail {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 9px;
      min-height: 0;
    }

    .pitch-mini-card {
      position: relative;
      padding: 26px 10px 10px;
      border-radius: 12px;
      border: 1px solid rgb(0 0 0 / 0.09);
      background: rgb(255 255 255 / 0.92);
      box-shadow: 0 1px 3px rgb(0 0 0 / 0.05);
      display: grid;
      gap: 7px;
      align-content: start;
      min-height: 0;
      transition:
        border-color 0.22s ease,
        box-shadow 0.22s ease;
    }

    .pitch-cell-badge {
      position: absolute;
      inset-inline-start: 9px;
      inset-block-start: 8px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.53rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgb(255 244 236 / 1);
      color: rgb(160 72 48 / 1);
      border: 1px solid rgb(0 0 0 / 0.06);
    }

    .pitch-cell-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.71rem;
      font-weight: 900;
      color: var(--v1-ink);
    }

    .pitch-cell-ico {
      font-size: 0.88rem;
      opacity: 0.88;
    }

    .pitch-skel-lines {
      display: grid;
      gap: 6px;
      padding-top: 3px;
    }

    .pitch-skel-line {
      height: 7px;
      border-radius: 5px;
      background: rgb(0 0 0 / 0.065);
      border: 1px solid rgb(0 0 0 / 0.05);
    }

    .pitch-skel-line:nth-child(2) {
      width: 90%;
    }

    .pitch-skel-line:nth-child(3) {
      width: 76%;
    }

    .pitch-skel-line:nth-child(4) {
      width: 84%;
    }

    .pitch-render-zone {
      flex: 1;
      min-height: 56px;
      border-radius: 9px;
      border: 1.5px dashed color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 32%, rgb(0 0 0 / 0.08));
      background: color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 6%, rgb(255 255 255 / 1));
    }

    .pitch-bento__cell--timeline {
      padding: 26px 11px 11px;
      border-radius: 14px;
      border: 1px solid rgb(0 0 0 / 0.09);
      background: rgb(255 255 255 / 0.9);
      box-shadow: 0 1px 3px rgb(0 0 0 / 0.05);
      display: grid;
      gap: 8px;
      align-content: start;
      min-height: 0;
      transition:
        border-color 0.22s ease,
        box-shadow 0.22s ease;
    }

    .pitch-timeline-lanes {
      display: grid;
      gap: 7px;
      padding-top: 4px;
    }

    .pitch-lane {
      height: 10px;
      border-radius: 6px;
      background: color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 22%, rgb(255 255 255 / 1));
      border: 1px solid color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 35%, rgb(0 0 0 / 0.06));
    }

    .pitch-lane:nth-child(2) {
      width: 86%;
    }

    .pitch-lane:nth-child(4) {
      width: 71%;
    }

    .pitch-bento__cell--output {
      padding: 26px 10px 12px;
      border-radius: 14px;
      border: 1px solid rgb(0 0 0 / 0.09);
      background: linear-gradient(165deg, rgb(255 255 255 / 1), rgb(248 246 244 / 1));
      box-shadow: 0 1px 3px rgb(0 0 0 / 0.05);
      display: grid;
      gap: 8px;
      justify-items: center;
      align-content: start;
      transition:
        border-color 0.22s ease,
        box-shadow 0.22s ease;
    }

    .pitch-device {
      position: relative;
      overflow: hidden;
      width: min(48vw, 158px);
      aspect-ratio: 9 / 16;
      padding: 11px;
      border-radius: 22px;
      border: 2px solid rgb(28 28 32 / 1);
      background: linear-gradient(145deg, rgb(52 52 58 / 1), rgb(22 22 26 / 1));
      box-shadow:
        0 16px 28px rgb(0 0 0 / 0.18),
        0 0 0 1px rgb(255 255 255 / 0.06) inset;
    }

    .pitch-device-screen {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      border: 1px solid rgb(0 0 0 / 0.45);
      background: #0b0b0e;
      display: grid;
      place-content: center;
      place-items: center;
      text-align: center;
      color: rgb(255 255 255 / 0.38);
      font-size: 0.68rem;
      font-weight: 820;
      line-height: 1.35;
    }

    .pitch-device-screen--preview {
      position: relative;
      padding: 0;
      overflow: hidden;
      display: block;
      background: #050508;
    }

    .pitch-device-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .pitch-device-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      vertical-align: middle;
    }

    .pitch-device-play {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 1.35rem;
      line-height: 1;
      color: rgb(255 255 255 / 0.82);
      text-shadow: 0 2px 12px rgb(0 0 0 / 0.55);
      pointer-events: none;
    }

    .pitch-cell-badge--done {
      background: color-mix(in srgb, rgb(22 163 91 / 1) 12%, rgb(255 255 255 / 1));
      color: rgb(21 100 58 / 1);
      border-color: color-mix(in srgb, rgb(22 163 91 / 1) 28%, rgb(0 0 0 / 0.08));
    }

    .pitch-drop-file {
      margin-top: 5px;
      font-size: 0.62rem;
      font-weight: 750;
      color: rgb(90 92 105 / 1);
      letter-spacing: 0.02em;
    }

    .pitch-transcript-lines {
      display: grid;
      gap: 5px;
      padding-top: 3px;
      max-height: 5.8rem;
      overflow: auto;
      min-height: 0;
    }

    .pitch-transcript-line {
      margin: 0;
      font-size: 0.62rem;
      font-weight: 650;
      line-height: 1.38;
      color: rgb(52 54 64 / 1);
    }

    .pitch-render-zone--done {
      border-style: solid;
      border-color: color-mix(in srgb, rgb(22 163 91 / 1) 35%, rgb(0 0 0 / 0.08));
      background: color-mix(in srgb, rgb(22 163 91 / 1) 8%, rgb(255 255 255 / 1));
      display: grid;
      place-items: center;
    }

    .pitch-render-done-label {
      font-size: 0.62rem;
      font-weight: 850;
      color: rgb(21 100 58 / 1);
    }

    .pitch-timeline-scene {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      padding: 6px 7px;
      border-radius: 9px;
      border: 1px solid rgb(0 0 0 / 0.06);
      background: rgb(255 255 255 / 0.72);
    }

    .pitch-timeline-scene-thumb {
      border-radius: 6px;
      overflow: hidden;
      width: 38px;
      aspect-ratio: 9 / 16;
    }

    .pitch-timeline-thumb-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .pitch-timeline-scene-title {
      font-size: 0.65rem;
      font-weight: 850;
      color: var(--v1-ink);
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pitch-timeline-scene-sub {
      font-size: 0.55rem;
      font-weight: 700;
      margin-top: 2px;
      color: rgb(105 106 118 / 1);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;

    /* Scroll-sync wizard focus */
    .pitch-app-shell[data-highlight="upload"] .pitch-drop-card {
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 30%, transparent);
      border-color: color-mix(in srgb, var(--panel-accent, var(--v1-red)) 55%, rgb(0 0 0 / 0.12));
    }

    .pitch-app-shell[data-highlight="transcript"] .pitch-mini-card--transcript {
      border-color: color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 38%, rgb(0 0 0 / 0.1));
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 22%, transparent);
    }

    .pitch-app-shell[data-highlight="timeline"] .pitch-bento__cell--timeline {
      border-color: color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 42%, rgb(0 0 0 / 0.1));
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 22%, transparent),
        0 10px 22px rgb(200 32 43 / 0.07);
    }

    .pitch-app-shell[data-highlight="segments"] .pitch-bento__cell--timeline {
      border-color: color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 48%, rgb(0 0 0 / 0.1));
      box-shadow:
        0 0 0 2px color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 28%, transparent),
        0 12px 26px rgb(200 32 43 / 0.09);
    }

    .pitch-app-shell[data-highlight="segments"] .pitch-timeline-scene {
      border-radius: 10px;
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 35%, rgb(0 0 0 / 0.08));
    }

    .pitch-app-shell[data-highlight="segments"] .pitch-timeline-scene-thumb {
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 40%, transparent);
    }

    .pitch-app-shell[data-highlight="render"] .pitch-mini-card--render {
      border-color: color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 38%, rgb(0 0 0 / 0.1));
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 22%, transparent);
    }

    .pitch-app-shell[data-highlight="output"] .pitch-bento__cell--output {
      border-color: color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 38%, rgb(0 0 0 / 0.1));
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 18%, transparent);
    }

    .pitch-app-shell[data-highlight="masthead"] .pitch-app-head {
      box-shadow: inset 0 0 0 2px rgb(255 255 255 / 0.28);
    }

    .pitch-app-shell[data-highlight="tabs"] .pitch-app-tabs {
      border-bottom-color: color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 45%, rgb(0 0 0 / 0.08));
    }

    @media (prefers-reduced-motion: no-preference) {
      .pitch-app-shell[data-highlight="timeline"] .pitch-bento__cell--timeline {
        animation: pitch-app-softpulse 3s ease-in-out infinite;
      }

      .pitch-app-shell[data-highlight="segments"] .pitch-bento__cell--timeline {
        animation: pitch-app-softpulse 3s ease-in-out infinite;
      }

      @keyframes pitch-app-softpulse {
        0%,
        100% {
          box-shadow:
            0 0 0 1px color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 20%, transparent),
            0 8px 18px rgb(200 32 43 / 0.06);
        }

        50% {
          box-shadow:
            0 0 0 3px color-mix(in srgb, var(--panel-accent, var(--v1-coral)) 14%, transparent),
            0 12px 24px rgb(200 32 43 / 0.09);
        }
      }

    @media (max-width: 860px) {
      .pitch-bento {
        grid-template-columns: 1fr;

      .pitch-app-head {
        grid-template-columns: 1fr;
        text-align: center;

      .pitch-app-head-brand {
        justify-content: center;
      }

      .pitch-app-head-actions {
        justify-self: center;
      }

      .pitch-app-head-title {
        grid-column: 1 / -1;
        order: -1;

    /* Intro hero: copy + hero downloads only (no device mockup) */
    #intro.story-panel {
      padding-block: calc(var(--nav-height) + 22px) clamp(28px, 5vh, 52px);
      padding-inline: clamp(18px, 4vw, 64px);
    }

    #intro .panel-inner {
      width: min(1220px, 100%);
      grid-template-columns: 1fr;
      align-items: stretch;
      justify-items: stretch;
      gap: clamp(18px, 3.5vw, 36px);
      box-sizing: border-box;
      max-width: min(47rem, 92vw);
      margin-inline: auto;
    }

    #intro .panel-copy--intro {
      gap: clamp(14px, 1.6vw, 22px);
      min-height: 0;
      width: 100%;
      max-width: none;
    }

    #intro .panel-copy--intro .kicker {
      text-transform: none;
      letter-spacing: 0.02em;
      font-size: clamp(0.82rem, 1.05vw, 0.98rem);
      font-weight: 950;
    }

    #intro h1 {
      font-size: clamp(2.35rem, 0.45rem + 4vw, 4.65rem);
      max-width: min(100%, 26rem);
      line-height: 1.08;
      letter-spacing: -0.03em;
      font-weight: 950;
      text-wrap: balance;
    }

    #intro .lead {
      font-size: clamp(0.98rem, 0.35vw + 0.9rem, 1.32rem);
      max-width: min(100%, 44rem);
      line-height: 1.45;
      display: block;
      margin: 0;
      overflow: visible;
    }

    #intro .hero-downloads {
      margin-top: clamp(12px, 2.2vw, 22px);
      max-width: none;
      width: 100%;
      padding: clamp(16px, 2.5vw, 20px) clamp(18px, 2.8vw, 22px);
      border: 2px solid var(--v1-ink);
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgb(255 255 255 / 0.96), rgb(252 236 232 / 0.45));
      box-shadow:
        0 14px 34px rgb(15 23 42 / 0.07),
        4px 4px 0 rgb(0 0 0 / 0.1);
    }

    #intro .hero-downloads-title {
      margin: 0 0 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgb(0 0 0 / 0.08);
      font-size: clamp(0.86rem, 1.05vw, 1.05rem);
      font-weight: 950;
      letter-spacing: 0.02em;
    }

    #intro .download-links--hero {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    #intro .download-links--hero > a {
      min-height: 44px;
      padding: 0 12px;
      font-size: clamp(0.72rem, 0.55vw + 0.65rem, 0.88rem);
      border-radius: 12px;
      box-shadow:
        0 6px 18px rgb(249 84 62 / 0.22),
        2px 2px 0 rgb(0 0 0 / 0.12);
      gap: 10px;
      justify-content: center;
      text-align: center;
      flex-direction: row-reverse;
    }

    /* External-link glyph reads correctly in RTL (inline-start side of label). */
    #intro .download-links--hero > a::after {
      content: "\2197";
      flex-shrink: 0;
      direction: ltr;
      unicode-bidi: isolate;
    }

    #intro .download-links--hero a.primary {
      min-height: 48px;
      font-size: clamp(0.78rem, 0.5vw + 0.68rem, 0.92rem);
      font-weight: 950;
      box-shadow:
        0 8px 22px rgb(249 84 62 / 0.28),
        2px 2px 0 rgb(0 0 0 / 0.14);
    }

    #intro .download-links--hero > .download-links--hero-extra {
      grid-column: 1 / -1;
    }

    #intro .download-links--hero-extra {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed rgb(0 0 0 / 0.14);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    #intro .download-links--hero-extra a {
      min-height: 40px;
      padding: 0 10px;
      font-size: clamp(0.68rem, 0.45vw + 0.62rem, 0.82rem);
      font-weight: 850;
      border-radius: 11px;
      box-shadow: 2px 2px 0 rgb(0 0 0 / 0.1);
      background: rgb(255 255 255 / 0.92);
      color: var(--v1-ink);
      justify-content: center;
      text-align: center;
      flex-direction: row;
    }

    #intro .download-links--hero-extra a::after {
      display: none;
    }

    @media (max-height: 720px) {
      #intro .panel-inner {
        gap: clamp(14px, 2.5vh, 24px);
      }

      #intro h1 {
        font-size: clamp(1.55rem, 3.5vh, 2.9rem);
        max-width: min(100%, 24rem);
        line-height: 1.08;
        letter-spacing: -0.03em;

      #intro .panel-inner {
        max-width: min(47rem, 92vw);
      }

      unicode-bidi: isolate;
      display: inline-flex;

      gap: .25rem;
      padding: .22rem .5rem;
      border: 1.5px solid var(--v1-ink);
      border-radius: 999px;
      background: rgb(255 255 255 / .72);

      letter-spacing: .01em;

      transform: translateY(0);
      cursor: pointer;

    .builder-credit:focus-visible {

      outline-offset: 2px;
      transform: translateY(-2px);

    /** Normalise merge key for `desktopCluster`; empty = no cluster. */
    function normalizeDesktopCluster(section) {
      const v = section.desktopCluster;
      if (typeof v !== "string") return "";
      return v.trim();
    }

    /**
     * Cells for the horizontal scrub: singletons, or 2+ consecutive slides with the same `desktopCluster`
     * merged into one lane with an inner vertical scroll stack.
     */
    function buildStoryCells(sections) {
      const out = [];
      let i = 0;
      while (i < sections.length) {
        const cid = normalizeDesktopCluster(sections[i]);
        if (cid) {
          const grouped = [];
          while (i < sections.length && normalizeDesktopCluster(sections[i]) === cid) {
            grouped.push({ section: sections[i], globalIdx: i });
            i++;
          }
          if (grouped.length >= 2) {
            out.push({ type: "cluster", cid, grouped });
          } else {
            out.push({ type: "single", section: grouped[0].section, globalIdx: grouped[0].globalIdx });
          }
        } else {
          out.push({ type: "single", section: sections[i], globalIdx: i });
          i++;
        }
      }
      return out;
    }

          return `<li role="button" tabindex="0" class="pitch-studio-phase-pick" data-studio-phase-bullet="${ph}">${escapeHtml(item)}</li>`;

      }

      if (section.bullets.length === 0) return "";

      const desktopItems = section.bullets.map(item => `<li>${escapeHtml(item)}</li>`).join("");
      if (hasMobileBullets) {
        const mob = mobileList.map(item => `<li>${escapeHtml(item)}</li>`).join("");
        return `<ul class="bullets bullets-desktop-only">${desktopItems}</ul><ul class="bullets panel-mobile-bullets">${mob}</ul>`;
      }
      return `<ul class="bullets">${desktopItems}</ul>`;

    function singlePanelSectionHtml(section, globalIdx, rollIdx) {
      const heroDownloads = section.id === "intro" ? heroDownloadsBlock() : "";
      const visualAria =
        section.visual === "excalidrawDemo" || section.visual === "catalogScreenshot"

            sec.id === "v1-next"

          const leadBlock = leadBlocksHtml(sec, pitchProductLayout);

        aria-label="פרק עם גלילה אנכית פנימית"
      >

    function buildStoryRollHtml(sections) {
      const cells = buildStoryCells(sections);
      return cells
        .map((cell, rollIdx) => {
          if (cell.type === "cluster") return clusteredPanelSectionHtml(cell.cid, cell.grouped, rollIdx);

    (function initMobileDesktopCta() {

    const pitchStepUp = document.getElementById("pitch-step-up");
    const pitchStepDown = document.getElementById("pitch-step-down");

    function collectPitchSteps() {
      const out = [];
      document.querySelectorAll("#storyRoll > .story-panel").forEach(panel => {
        if (panel.classList.contains("story-panel--vcluster")) {
          const vstack = panel.querySelector(":scope > .story-vstack");
          if (!vstack) return;
          vstack.querySelectorAll(":scope > .story-subslide").forEach(sub => {
            out.push({ el: sub, panel, vstack });
          });
        } else {
          out.push({ el: panel, panel, vstack: null });
        }
      });
      return out;
    }

    function isHorizontalStoryDesktop() {
      return (
        window.matchMedia("(min-width: 861px)").matches &&
        document.body.classList.contains("is-scrollstory") &&
        !document.body.classList.contains("pitch-vertical") &&
        !!mainScrollTrigger
      );
    }

    function getActivePitchStepIndex(steps) {
      if (!steps.length) return 0;
      if (isHorizontalStoryDesktop()) {
        const rollPanels = gsap.utils.toArray("#storyRoll > .story-panel");
        const st = mainScrollTrigger;
        const n = rollPanels.length;
        if (n < 1) return 0;
        const denom = Math.max(1, n - 1);
        const rollIdx = Math.min(n - 1, Math.max(0, Math.round(st.progress * denom)));
        const activePanel = rollPanels[rollIdx];
        const cand = steps.map((s, i) => ({ s, i })).filter(x => x.s.panel === activePanel);
        if (!cand.length) return 0;
        if (cand.length === 1) return cand[0].i;
        const vstack = cand[0].s.vstack;
        if (!vstack) return cand[0].i;
        const vr = vstack.getBoundingClientRect();
        const midY = vr.top + vr.height / 2;
        let bestI = cand[0].i;
        let bestD = Infinity;
        cand.forEach(({ s, i }) => {
          const r = s.el.getBoundingClientRect();
          const d = Math.abs(r.top + r.height / 2 - midY);
          if (d < bestD) {
            bestD = d;
            bestI = i;
          }
        });
        return bestI;
      }

      const cy = window.innerHeight / 2;
      let best = 0;
      let bestD = Infinity;
      steps.forEach((s, i) => {
        const r = s.el.getBoundingClientRect();
        if (!r.height && !r.width) return;
        const d = Math.abs(r.top + r.height / 2 - cy);
        if (d < bestD) {
          bestD = d;
          best = i;
        }
      });
      return best;
    }

    function syncPitchStepHash(step) {
      if (!step || !step.el.id) return;
      const h = "#" + step.el.id;
      if (location.hash === h) return;
      try {
        history.replaceState(null, "", h);
      } catch (_) {}
    }

    function centerSubslideInVstack(step) {
      if (!step || !step.el.classList.contains("story-subslide") || !step.vstack) return;
      const v = step.vstack;
      const sub = step.el;
      const maxS = Math.max(0, v.scrollHeight - v.clientHeight);
      const desired = sub.offsetTop - (v.clientHeight - sub.offsetHeight) / 2;
      v.scrollTop = Math.max(0, Math.min(maxS, desired));
    }

    function updatePitchStepNavButtons(idx, total) {
      if (pitchStepUp) pitchStepUp.disabled = idx <= 0;
      if (pitchStepDown) pitchStepDown.disabled = idx >= total - 1;
    }

    function goToPitchStepIndex(targetIdx) {
      const steps = collectPitchSteps();
      if (!steps.length) return;
      const idx = Math.min(steps.length - 1, Math.max(0, targetIdx));
      const step = steps[idx];
      const behavior = reduceMotion ? "auto" : "smooth";

      if (!isHorizontalStoryDesktop()) {
        step.el.scrollIntoView({ block: "center", inline: "nearest", behavior });
        syncPitchStepHash(step);
        updatePitchStepNavButtons(idx, steps.length);
        return;
      }

      const st = mainScrollTrigger;
      if (!st) {
        step.el.scrollIntoView({ block: "center", inline: "nearest", behavior: "auto" });
        syncPitchStepHash(step);
        updatePitchStepNavButtons(idx, steps.length);
        return;
      }

      const rollPanels = gsap.utils.toArray("#storyRoll > .story-panel");
      const denom = Math.max(1, rollPanels.length - 1);
      const rollIdx = Number(step.panel.dataset.rollIndex ?? step.panel.dataset.index ?? 0);
      const progress = denom ? rollIdx / denom : 0;
      const top = st.start + (st.end - st.start) * progress;

      const finish = () => {
        centerSubslideInVstack(step);
        if (window.ScrollTrigger) ScrollTrigger.refresh();
        syncPitchStepHash(step);
        updatePitchStepNavButtons(idx, steps.length);
      };

      window.scrollTo({ top, behavior: "auto" });
      requestAnimationFrame(() => {
        requestAnimationFrame(finish);
      });
    }

    function goToPitchStepDelta(delta) {
      const steps = collectPitchSteps();
      if (!steps.length) return;
      const cur = getActivePitchStepIndex(steps);
      goToPitchStepIndex(cur + delta);
    }

    function onPitchStepKeydown(ev) {
      const t = ev.target;
      if (t && t.closest && t.closest("input, textarea, select, [contenteditable='true']")) return;
      if (ev.defaultPrevented) return;
      if (ev.key === "ArrowUp") {
        ev.preventDefault();
        goToPitchStepDelta(-1);
      } else if (ev.key === "ArrowDown") {
        ev.preventDefault();
        goToPitchStepDelta(1);
      }
    }

    function refreshPitchStepNavUi() {
      const steps = collectPitchSteps();
      if (!steps.length) return;
      const idx = getActivePitchStepIndex(steps);
      updatePitchStepNavButtons(idx, steps.length);
    }

    let pitchStepNavInitialized = false;
    function initPitchStepNav() {
      if (pitchStepNavInitialized) return;
      if (!pitchStepUp || !pitchStepDown) return;
      pitchStepNavInitialized = true;
      pitchStepUp.addEventListener("click", () => goToPitchStepDelta(-1));
      pitchStepDown.addEventListener("click", () => goToPitchStepDelta(1));
      document.addEventListener("keydown", onPitchStepKeydown);
      window.addEventListener("scroll", refreshPitchStepNavUi, { passive: true });
      refreshPitchStepNavUi();
    }

    /** Studio wizard: four explicit phases, click + keyboard; no GSAP/RAF tour. */
    const STUDIO_PHASES = ["upload", "transcript", "planning", "render"];
    const STUDIO_HIGHLIGHT_FOR_PHASE = {
      upload: "upload",
      transcript: "transcript",
      planning: "segments",
      render: "output",
    };

    let studioWizardPhase = "upload";

    function setStudioPhase(phase) {
      if (!STUDIO_PHASES.includes(phase)) return;
      studioWizardPhase = phase;
      const shell = document.querySelector("#studio .pitch-app-shell");
      if (shell) {
        shell.dataset.studioPhase = phase;
        shell.dataset.highlight = STUDIO_HIGHLIGHT_FOR_PHASE[phase] || phase;
      }
      updateStudioBulletPhases(phase);
    }

    function updateStudioBulletPhases(activePhase) {
      const panel = document.getElementById("studio");
      if (!panel) return;
      const activeIndex = STUDIO_PHASES.indexOf(activePhase);

      panel.querySelectorAll(".panel-copy .bullets--studio-wizard li[data-studio-phase-bullet]").forEach(li => {
        const raw = li.getAttribute("data-studio-phase-bullet") || "";
        const index = STUDIO_PHASES.indexOf(raw);
        const isActive = raw === activePhase;
        const isComplete = index >= 0 && index < activeIndex;

        li.classList.toggle("is-wizard-active", isActive);
        li.classList.toggle("is-studio-phase-complete", isComplete);
        if (isActive) li.setAttribute("aria-current", "step");
        else li.removeAttribute("aria-current");
      });
    }

    function teardownStudioWizardHighlight() {
      if (typeof studioWizardCleanup === "function") {
        studioWizardCleanup();
        studioWizardCleanup = null;
      }

      studioWizardPhase = "upload";

      const shell = document.querySelector("#studio .pitch-app-shell");
      if (shell) {
        shell.dataset.studioPhase = "upload";
        shell.dataset.highlight = "upload";
      }

      updateStudioBulletPhases("upload");
    }

    function focusStudioPhaseListitem(phase) {
      const panel = document.getElementById("studio");
      if (!panel || !phase) return;
      const sel = `li[data-studio-phase-bullet="${phase}"]`;
      for (const ul of panel.querySelectorAll(".panel-copy .bullets--studio-wizard")) {
        const li = ul.querySelector(sel);
        if (li && li.offsetParent !== null) {
          li.focus();
          return;
        }
      }
      panel.querySelector(`.panel-copy ${sel}`)?.focus();
    }

    function initStudioWizardHighlight() {
      teardownStudioWizardHighlight();
      const root = document.getElementById("studio");
      if (!root) return;

      const onClick = event => {
        const li = event.target.closest("#studio .panel-copy li[data-studio-phase-bullet]");
        if (!li || !root.contains(li)) return;
        const phase = li.getAttribute("data-studio-phase-bullet") || "";
        if (!STUDIO_PHASES.includes(phase)) return;
        setStudioPhase(phase);
      };

      const onKeydown = event => {
        const t = event.target;
        if (!t || !t.matches("li[data-studio-phase-bullet]") || !root.contains(t) || !t.closest(".panel-copy")) {
          return;
        }

        const phase = t.getAttribute("data-studio-phase-bullet") || "";
        if (!STUDIO_PHASES.includes(phase)) return;

        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          setStudioPhase(phase);
          return;
        }

        if (event.key !== "ArrowRight" && event.key !== "ArrowLeft") return;

        event.preventDefault();
        const currentIndex = STUDIO_PHASES.indexOf(studioWizardPhase);
        if (currentIndex < 0) return;

        const direction = event.key === "ArrowRight" ? 1 : -1;
        const nextIndex = Math.max(0, Math.min(STUDIO_PHASES.length - 1, currentIndex + direction));
        const nextPhase = STUDIO_PHASES[nextIndex];
        setStudioPhase(nextPhase);
        focusStudioPhaseListitem(nextPhase);
      };

      root.addEventListener("click", onClick);
      root.addEventListener("keydown", onKeydown);
      studioWizardCleanup = () => {
        root.removeEventListener("click", onClick);
        root.removeEventListener("keydown", onKeydown);
      };

      setStudioPhase("upload");
    }

    function setProgress(value) {
      const clamped = Math.max(0, Math.min(1, value));
      progressFill.style.transform = `scaleX(${clamped})`;
    }

    function teardownHorizontalStory() {
      teardownStudioWizardHighlight();
      teardownVerticalClusterWheelCaptures();
      teardownHorizontalPanelReveals();
      teardownVerticalPanelReveals();
      if (horizontalTween) {
        horizontalTween.kill();
        horizontalTween = null;
      }
      mainScrollTrigger = null;
    }

    /** Panel reveal: studio steps are copy-column `.pitch-studio-phase-pick` items. */
    const PANEL_REVEAL_SEL =
      ".kicker, h1, h2, .pitch-lead-well .lead, .lead, .panel-mobile-summary, .bullets li, .pitch-pricing-quote, .pitch-studio-phase-pick, .pitch-catalog-screenshot, .pitch-catalog-tag-modal-open, .hero-downloads, .panel-visual > *";

    /**
     * verticalStack = desktop TTB pitch; false = entrances during horizontal-pin (`ScrollTrigger.horizontal` + containerAnimation).
     * `panel.dataset.transition`: rtl | ttb-showcase | ttb-subtle
     */
    function panelRevealTweenVars(panel, verticalStack) {
      const mode = panel.dataset.transition || "ttb-subtle";
      const carousel = verticalStack !== true;

      if (mode === "rtl") {
        return {
          x: carousel ? 52 : 44,
          y: 0,
          duration: verticalStack ? 0.55 : 0.58,
          stagger: carousel ? 0.06 : 0.05,
          ease: verticalStack ? "power2.out" : "power3.out",
        };
      }

      const showcase = mode === "ttb-showcase";

      if (carousel) {
        return {
          x: 0,
          y: showcase ? 46 : 20,
          duration: showcase ? 0.7 : 0.48,
          stagger: showcase ? 0.095 : 0.035,
          ease: showcase ? "power3.out" : "power2.out",
        };
      }

      return {
        x: 0,
        y: showcase ? 50 : 32,
        duration: showcase ? 0.62 : 0.52,
        stagger: showcase ? 0.08 : 0.045,
        ease: showcase ? "power3.out" : "power2.out",
      };
    }

    function teardownHorizontalPanelReveals() {
      horizontalPanelRevealAnims.forEach(anim => {
        if (!anim) return;
        const st = anim.scrollTrigger;
        if (st) st.kill(false);
        anim.kill();
      });
      horizontalPanelRevealAnims = [];
    }

    function teardownVerticalPanelReveals() {
      verticalPanelRevealAnims.forEach(anim => {
        if (!anim) return;
        const st = anim.scrollTrigger;
        if (st) st.kill(false);
        anim.kill();
      });
      verticalPanelRevealAnims = [];
    }

    function teardownVerticalClusterWheelCaptures() {
      verticalClusterWheelCleanups.forEach(fn => {
        try {
          fn();
        } catch (_) {}
      });
      verticalClusterWheelCleanups = [];
    }

    function clusterInnerWheelGuard(ev) {
      if (!document.body.classList.contains("is-scrollstory") || document.body.classList.contains("pitch-vertical")) return;
      if (window.matchMedia("(max-width: 860px)").matches) return;
      const sc = ev.currentTarget;
      if (!(sc instanceof HTMLElement)) return;

      const tol = 2;
      const dy = ev.deltaY;
      const st = sc.scrollTop;
      const max = Math.max(0, sc.scrollHeight - sc.clientHeight);
      const canDown = dy > 0 && st < max - tol;
      const canUp = dy < 0 && st > tol;
      if (canDown || canUp) ev.preventDefault();
      if (canDown || canUp) sc.scrollTop = Math.min(max, Math.max(0, st + dy));
    }

    function attachHorizontalVerticalClusters() {
      teardownVerticalClusterWheelCaptures();
      if (reduceMotion) return;
      document.querySelectorAll(".story-panel--vcluster .story-vstack").forEach(box => {
        box.addEventListener("wheel", clusterInnerWheelGuard, { passive: false });
        verticalClusterWheelCleanups.push(() => box.removeEventListener("wheel", clusterInnerWheelGuard));
        box.addEventListener("scroll", refreshPitchStepNavUi, { passive: true });
        verticalClusterWheelCleanups.push(() => box.removeEventListener("scroll", refreshPitchStepNavUi));
      });
    }

    /** Panel `from(...)` entrances driven by scrub strip tween (requires `horizontal: true` + `containerAnimation`). */
    function initHorizontalPanelReveals(containerTween) {
      teardownHorizontalPanelReveals();
      if (!window.gsap || !window.ScrollTrigger || !containerTween || reduceMotion) return;

      gsap.utils.toArray("#storyRoll .story-panel").forEach(panel => {
        const revealRoot = panel.classList.contains("story-panel--vcluster")
          ? panel.querySelector(".story-subslide")
          : panel;
        if (!revealRoot) return;
        const targets = revealRoot.querySelectorAll(PANEL_REVEAL_SEL);
        if (!targets.length) return;
        const vars = panel.classList.contains("story-panel--vcluster")
          ? panelRevealTweenVars(revealRoot, false)
          : panelRevealTweenVars(panel, false);
        const anim = gsap.from(targets, {
          ...vars,
          immediateRender: false,
          scrollTrigger: {
            trigger: panel,
            horizontal: true,
            containerAnimation: containerTween,
            start: "left 92%",
            end: "left 38%",
            once: true,
            invalidateOnRefresh: true,
          },
        });
        horizontalPanelRevealAnims.push(anim);
      });
      ScrollTrigger.refresh();
    }

    let scrollTriggerSizingHooked = false;

    /** Re-measure after paint + window.load so pin/end match final scrollWidth (avoids empty slides). */
    function queueScrollTriggerSizingPass() {
      const run = () => {
        if (!window.ScrollTrigger) return;
        syncStoryViewportWidthCss();
        if (horizontalTween) horizontalTween.invalidate();
        ScrollTrigger.refresh(true);
        const st = horizontalTween && horizontalTween.scrollTrigger;
        const onlyIntroOrNoHash =
          !location.hash || location.hash === "#" || location.hash === "#intro";
        /** scrollY pinned at section start should map to ~progress 0; high progress ⇒ scrub state machine bug (often RTL + snap). */
        const pinnedAtStartBroken =
          st &&
          typeof st.start === "number" &&
          document.body.classList.contains("is-scrollstory") &&
          !document.body.classList.contains("pitch-vertical") &&
          onlyIntroOrNoHash &&
          window.scrollY <= st.start + 40 &&
          st.progress > 0.85;
        const stuckAtEndDesktop =
          st &&
          document.body.classList.contains("is-scrollstory") &&
          !document.body.classList.contains("pitch-vertical") &&
          !location.hash &&
          window.scrollY < 12 &&
          st.progress > 0.92;
        if (pinnedAtStartBroken || stuckAtEndDesktop) {
          window.scrollTo(0, 0);
          horizontalTween.invalidate();
          ScrollTrigger.refresh(true);
        }
      };
      requestAnimationFrame(() => {
        requestAnimationFrame(run);
      });
      if (scrollTriggerSizingHooked) return;
      scrollTriggerSizingHooked = true;
      const afterLoad = () => {
        requestAnimationFrame(() => {
          requestAnimationFrame(run);
        });
      };
      if (document.readyState === "complete") afterLoad();
      else window.addEventListener("load", afterLoad, { once: true });
    }

    function initVerticalPanelReveals() {
      teardownVerticalPanelReveals();
      gsap.registerPlugin(ScrollTrigger);
      gsap.utils.toArray(".story-panel").forEach(panel => {
        if (panel.classList.contains("story-panel--vcluster")) {
          gsap.utils
            .toArray(panel.querySelectorAll(":scope > .story-vstack > .story-subslide"))
            .forEach(subslide => {
              const targets = subslide.querySelectorAll(PANEL_REVEAL_SEL);
              if (!targets.length) return;
              const anim = gsap.from(targets, {
                ...panelRevealTweenVars(subslide, true),
                immediateRender: false,
                scrollTrigger: {
                  trigger: subslide,
                  start: "top 86%",
                  once: true,
                },
              });
              verticalPanelRevealAnims.push(anim);
            });
          return;
        }
        const targetsPanel = panel.querySelectorAll(PANEL_REVEAL_SEL);
        if (!targetsPanel.length) return;
        const anim = gsap.from(targetsPanel, {
          ...panelRevealTweenVars(panel, true),
          immediateRender: false,
          scrollTrigger: {
            trigger: panel,
            start: "top 86%",
            once: true,
          },
        });
        verticalPanelRevealAnims.push(anim);
      });
    }

    function initScrollStory() {
      teardownHorizontalStory();
      teardownPassiveProgress();
      document.body.classList.remove("is-scrollstory", "scroll-rtlflow", "pitch-vertical");
      document.documentElement.classList.remove("pitch-vertical-desktop");

      const cfg = authorStoryMotion();
      const isDesktop = matchMedia("(min-width: 861px)").matches;
      const hasGsap = window.gsap && window.ScrollTrigger;

      if (!hasGsap || reduceMotion) {
        addPassiveProgress();
        initStudioWizardHighlight();
        refreshPitchStepNavUi();
        return;
      }

      if (cfg.verticalDesktop && isDesktop) {
        document.body.classList.add("pitch-vertical");
        document.documentElement.classList.add("pitch-vertical-desktop");
        addPassiveProgress();
        initVerticalPanelReveals();
        initStudioWizardHighlight();
        refreshPitchStepNavUi();
        return;
      }

      if (!isDesktop) {
        addPassiveProgress();
        initStudioWizardHighlight();
        refreshPitchStepNavUi();
        return;
      }

      gsap.registerPlugin(ScrollTrigger);
      try {
        if ("scrollRestoration" in history) history.scrollRestoration = "manual";
      } catch (_) {}
      scrollTo(0, 0);

      syncStoryViewportWidthCss();
      document.body.classList.add("is-scrollstory");
      if (cfg.rtlFlow) document.body.classList.add("scroll-rtlflow");

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          try {
            syncStoryViewportWidthCss();
            void trackRoll.offsetWidth;
            const panels = gsap.utils.toArray("#storyRoll .story-panel");
            const maxSpan = Math.max(1, panels.length - 1);
            /**
             * Vertical scroll distance for the pinned horizontal scrub.
             * Must stay in sync with real strip width: if this is too small, scrollY≈0 still maps to progress≈1
             * and only the last panel fills the viewport.
             */
            const getLanePx = () => {
              void trackRoll.offsetWidth;
              if (storyTrackEl) {
                const r = storyTrackEl.getBoundingClientRect();
                const w = Math.round(r.width || storyTrackEl.clientWidth || 0);
                if (w > 0) return w;
              }
              return Math.max(1, Math.round(window.innerWidth || document.documentElement.clientWidth || 1));
            };
            const getMaxScroll = () => {
              syncStoryViewportWidthCss();
              void trackRoll.offsetWidth;
              const lane = getLanePx();
              let measured = trackRoll.scrollWidth - lane;
              if (!Number.isFinite(measured)) measured = 0;
              measured = Math.max(0, measured);
              /** Wide cold load often yields a tiny but non‑zero measured (e.g. 50px) → pin range shrinks → progress clamps to 1 → only final slide. Always take at least (n−1)·lane (GSAP horizontal-scroll pattern). */
              const fallback = maxSpan * lane;
              return Math.max(1, measured, fallback);
            };

            /*
              RTL mode (body.scroll-rtlflow) mirrors .story-mirror + each .story-panel (text un-mirrors).
              Horizontal scrub must stay x: 0 → -getMaxScroll(): if we "swap" from/to, progress 0 maps to
              translateX(-full) and the viewport lands on the last DOM panel first.
            */

            horizontalTween = gsap.fromTo(
              trackRoll,
              { x: 0 },
              {
                x: () => -getMaxScroll(),
                ease: "none",
                scrollTrigger: {
                  invalidateOnRefresh: true,
                  trigger: "#story",
                  pin: true,
                  scrub: 1,
                  /*
                    ScrollTrigger snap frequently mis-resolves during first refresh with RTL/page restore,
                    pinning scroll to the last segment while URL/#intro expects progress 0. Re-enable snap
                    only after a proven stable pattern if step snapping is needed.
                  */
                  snap: false,
                  end: () => "+=" + getMaxScroll(),
                  onUpdate: self => setProgress(self.progress),
                },
              }
            );

            mainScrollTrigger = horizontalTween.scrollTrigger;

            ScrollTrigger.refresh();
            window.scrollTo(0, 0);
            queueScrollTriggerSizingPass();
            requestAnimationFrame(() => {
              window.scrollTo(0, 0);
              ScrollTrigger.refresh();
              initHorizontalPanelReveals(horizontalTween);
              attachHorizontalVerticalClusters();
              refreshPitchStepNavUi();
              initStudioWizardHighlight();
            });
          } catch (err) {
            console.warn("[scrollstory]", err);
          }
        });
      });
    }

    function addPassiveProgress() {
      teardownPassiveProgress();
      const update = () => {
        const max = Math.max(1, document.documentElement.scrollHeight - innerHeight);
        setProgress(scrollY / max);
      };
      window.addEventListener("scroll", update, { passive: true });
      passiveProgressCleanup = () => window.removeEventListener("scroll", update);
      update();
    }

    document.querySelectorAll('a[href^="#"]').forEach(link => {
      link.addEventListener("click", event => {
        const href = link.getAttribute("href");
        const targetId = href && href.startsWith("#") ? decodeURIComponent(href.slice(1)) : "";
        if (!href || href === "#" || !targetId) return;
        const targetElement = document.getElementById(targetId);
        if (!targetElement) return;
        event.preventDefault();
        const anchorPanel = targetElement.closest(".story-panel");
        if (mainScrollTrigger && document.body.classList.contains("is-scrollstory") && !document.body.classList.contains("pitch-vertical") && anchorPanel?.classList.contains("story-panel")) {
          const vst = anchorPanel.querySelector(":scope > .story-vstack");
          if (targetElement.classList.contains("story-subslide") && vst) {
            vst.scrollTo({ top: targetElement.offsetTop, behavior: "auto" });
          }
          const rollPanels = gsap.utils.toArray("#storyRoll > .story-panel");
          const denom = Math.max(1, rollPanels.length - 1);
          const rollIdx = Number(anchorPanel.dataset.rollIndex ?? anchorPanel.dataset.index ?? 0);
          const progress = denom ? rollIdx / denom : 0;
          const top = mainScrollTrigger.start + (mainScrollTrigger.end - mainScrollTrigger.start) * progress;
          scrollTo({ top, behavior: "auto" });
          return;
        }
        targetElement.scrollIntoView({ behavior: reduceMotion ? "auto" : "smooth", block: "start", inline: "start" });
      });
    });

    initScrollStory();

    initPitchStepNav();

    syncStoryViewportWidthCss();
    window.addEventListener("resize", () => {
      syncStoryViewportWidthCss();
      if (window.ScrollTrigger) ScrollTrigger.refresh();
      refreshPitchStepNavUi();
    });

    const desktopStoryMq = window.matchMedia("(min-width: 861px)");
    const onViewportStoryTierChange = () => {
      syncStoryViewportWidthCss();
      initScrollStory();
      requestAnimationFrame(() => {
        requestAnimationFrame(refreshPitchStepNavUi);
      });
    };
    if (typeof desktopStoryMq.addEventListener === "function") {
      desktopStoryMq.addEventListener("change", onViewportStoryTierChange);
    } else if (typeof desktopStoryMq.addListener === "function") {
      desktopStoryMq.addListener(onViewportStoryTierChange);
    }
  </script>
</body>
</html>
