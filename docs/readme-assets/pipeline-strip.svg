<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 160" role="img" aria-labelledby="ptitle">
  <title id="ptitle">Animated pipeline: audio to MP4</title>
  <defs>
    <linearGradient id="n1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#fb923c"/></linearGradient>
    <linearGradient id="n2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#c084fc"/></linearGradient>
    <linearGradient id="n3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#22d3ee"/></linearGradient>
    <linearGradient id="n4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#34d399"/></linearGradient>
    <linearGradient id="n5" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#f472b6"/></linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="920" height="160" rx="16" fill="#0f172a"/>
  <rect x="2" y="2" width="916" height="156" rx="14" fill="none" stroke="#334155" stroke-width="1" opacity="0.85">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="5s" repeatCount="indefinite"/>
  </rect>
  <!-- wire paths (for motion + dash) -->
  <!-- gaps between nodes: centers 84,264,444,624,804 — r40 → edges 124↔224, 304↔404, 484↔584, 664↔764 -->
  <g fill="none" stroke-linecap="round">
    <path id="w1" d="M124 80 H224" stroke="#475569" stroke-width="3"/>
    <path id="w2" d="M304 80 H404" stroke="#475569" stroke-width="3"/>
    <path id="w3" d="M484 80 H584" stroke="#475569" stroke-width="3"/>
    <path id="w4" d="M664 80 H764" stroke="#475569" stroke-width="3"/>
    <path d="M124 80 H224" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 14" opacity="0.75">
      <animate attributeName="stroke-dashoffset" values="0;-80" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M304 80 H404" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 14" opacity="0.75">
      <animate attributeName="stroke-dashoffset" values="0;-80" dur="1s" begin="0.22s" repeatCount="indefinite"/>
    </path>
    <path d="M484 80 H584" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 14" opacity="0.75">
      <animate attributeName="stroke-dashoffset" values="0;-80" dur="1s" begin="0.44s" repeatCount="indefinite"/>
    </path>
    <path d="M664 80 H764" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 14" opacity="0.75">
      <animate attributeName="stroke-dashoffset" values="0;-80" dur="1s" begin="0.66s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- data packets along wires -->
  <circle r="5" fill="#fbbf24" filter="url(#soft)">
    <animateMotion dur="1.25s" repeatCount="indefinite" path="M124 80 H224"/>
  </circle>
  <circle r="5" fill="#c084fc" filter="url(#soft)">
    <animateMotion dur="1.25s" repeatCount="indefinite" begin="0.28s" path="M304 80 H404"/>
  </circle>
  <circle r="5" fill="#22d3ee" filter="url(#soft)">
    <animateMotion dur="1.25s" repeatCount="indefinite" begin="0.56s" path="M484 80 H584"/>
  </circle>
  <circle r="5" fill="#34d399" filter="url(#soft)">
    <animateMotion dur="1.25s" repeatCount="indefinite" begin="0.84s" path="M664 80 H764"/>
  </circle>
  <!-- nodes + pulse rings -->
  <g transform="translate(28 38)">
    <circle cx="56" cy="42" r="46" fill="none" stroke="#fb923c" stroke-width="2" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="42;50;42" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="56" cy="42" r="40" fill="url(#n1)" filter="url(#soft)">
      <animate attributeName="r" values="38;41;38" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <text x="56" y="48" text-anchor="middle" fill="#0f172a" font-family="system-ui,sans-serif" font-size="11" font-weight="800">AUDIO</text>
  </g>
  <g transform="translate(208 38)">
    <circle cx="56" cy="42" r="46" fill="none" stroke="#c084fc" stroke-width="2" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="2.4s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="42;50;42" dur="2.4s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="56" cy="42" r="40" fill="url(#n2)" filter="url(#soft)">
      <animate attributeName="r" values="38;41;38" dur="2.8s" begin="0.35s" repeatCount="indefinite"/>
    </circle>
    <text x="56" y="44" text-anchor="middle" fill="#faf5ff" font-family="system-ui,sans-serif" font-size="10" font-weight="800">WHISPER</text>
    <text x="56" y="56" text-anchor="middle" fill="#faf5ff" font-family="system-ui,sans-serif" font-size="10" font-weight="800">+ PLAN</text>
  </g>
  <g transform="translate(388 38)">
    <circle cx="56" cy="42" r="46" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="r" values="42;50;42" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="56" cy="42" r="40" fill="url(#n3)" filter="url(#soft)">
      <animate attributeName="r" values="38;41;38" dur="2.8s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <text x="56" y="44" text-anchor="middle" fill="#042f2e" font-family="system-ui,sans-serif" font-size="10" font-weight="800">CATALOG</text>
    <text x="56" y="56" text-anchor="middle" fill="#042f2e" font-family="system-ui,sans-serif" font-size="10" font-weight="800">CLIPS</text>
  </g>
  <g transform="translate(568 38)">
    <circle cx="56" cy="42" r="46" fill="none" stroke="#34d399" stroke-width="2" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="42;50;42" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="56" cy="42" r="40" fill="url(#n4)" filter="url(#soft)">
      <animate attributeName="r" values="38;41;38" dur="2.8s" begin="1.05s" repeatCount="indefinite"/>
    </circle>
    <text x="56" y="48" text-anchor="middle" fill="#022c22" font-family="system-ui,sans-serif" font-size="11" font-weight="800">ffmpeg</text>
  </g>
  <g transform="translate(748 38)">
    <circle cx="56" cy="42" r="46" fill="none" stroke="#f472b6" stroke-width="2" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
      <animate attributeName="r" values="42;50;42" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="56" cy="42" r="40" fill="url(#n5)" filter="url(#soft)">
      <animate attributeName="r" values="38;41;38" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="56" y="44" text-anchor="middle" fill="#fdf2f8" font-family="system-ui,sans-serif" font-size="10" font-weight="800">9:16</text>
    <text x="56" y="56" text-anchor="middle" fill="#fdf2f8" font-family="system-ui,sans-serif" font-size="10" font-weight="800">MP4</text>
  </g>
</svg>
