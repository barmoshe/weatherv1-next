<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">WeatherV1 Next banner</title>
  <desc id="desc">Animated gradient broadcast header with 9:16 frame</desc>
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1222">
        <animate attributeName="stop-color" values="#0c1222;#152238;#1a2744;#0c1222" dur="14s" repeatCount="indefinite"/>
      </stop>
      <stop offset="45%" stop-color="#1e1b4b">
        <animate attributeName="stop-color" values="#1e1b4b;#312e81;#4c1d95;#1e1b4b" dur="14s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0e7490">
        <animate attributeName="stop-color" values="#0e7490;#0369a1;#155e75;#0e7490" dur="14s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="aurora" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="40%" stop-color="#a78bfa" stop-opacity="0.6">
        <animate attributeName="stop-opacity" values="0.35;0.7;0.35" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="60%" stop-color="#f472b6" stop-opacity="0.5">
        <animate attributeName="stop-opacity" values="0.25;0.55;0.25" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" additive="sum" values="-240 0;240 0;-240 0" dur="20s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8">
        <animate attributeName="stop-color" values="#38bdf8;#818cf8;#38bdf8" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#818cf8">
        <animate attributeName="stop-color" values="#818cf8;#c084fc;#818cf8" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="360" fill="url(#sky)"/>
  <rect width="1200" height="360" fill="url(#aurora)"/>
  <!-- drift grid -->
  <g opacity="0.1" stroke="#e0f2fe" stroke-width="1">
    <path d="M0 120 H1200 M0 240 H1200">
      <animateTransform attributeName="transform" type="translate" values="0 0;20 0;0 0" dur="24s" repeatCount="indefinite"/>
    </path>
    <path d="M200 0 V360 M400 0 V360 M600 0 V360 M800 0 V360 M1000 0 V360">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 12;0 0" dur="18s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- soft floating orbs -->
  <circle cx="320" cy="80" r="120" fill="#38bdf8" opacity="0.06">
    <animate attributeName="cx" values="300;340;300" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="70;95;70" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="280" r="90" fill="#f472b6" opacity="0.05">
    <animate attributeName="cx" values="500;560;500" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="270;300;270" dur="14s" repeatCount="indefinite"/>
  </circle>
  <!-- 9:16 frame -->
  <g transform="translate(880 40)">
    <rect x="0" y="0" width="140" height="249" rx="18" fill="none" stroke="url(#frame)" stroke-width="4">
      <animate attributeName="stroke-opacity" values="0.55;1;0.55" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="12" y="24" width="116" height="200" rx="8" fill="#020617" fill-opacity="0.65" stroke="#38bdf8" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.25;0.65;0.25" dur="4s" repeatCount="indefinite"/>
    </rect>
    <!-- waveform + shimmer -->
    <path d="M28 140 Q52 100 76 140 T124 140" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.85" filter="url(#glow)" stroke-linecap="round">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M28 140 Q52 100 76 140 T124 140" fill="none" stroke="#67e8f9" stroke-width="1.5" stroke-dasharray="10 40" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" values="0;-200" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.8s" repeatCount="indefinite"/>
    </path>
  </g>
  <!-- title -->
  <text x="56" y="130" fill="#f8fafc" font-family="ui-sans-serif,system-ui,sans-serif" font-size="52" font-weight="800" letter-spacing="-0.03em">WeatherV1</text>
  <text x="56" y="188" fill="#94a3b8" font-family="ui-monospace,Courier,monospace" font-size="28" font-weight="500">next &#183; local-first forecast video</text>
  <text x="56" y="248" fill="#67e8f9" font-family="ui-sans-serif,system-ui,sans-serif" font-size="18" font-weight="600">Whisper &#183; plan &#183; ffmpeg &#183; 9:16 MP4</text>
  <!-- rotating sun ring -->
  <circle cx="720" cy="200" r="64" fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.4" stroke-dasharray="12 10">
    <animateTransform attributeName="transform" type="rotate" from="0 720 200" to="360 720 200" dur="48s" repeatCount="indefinite"/>
  </circle>
  <!-- light rain -->
  <g stroke="#7dd3fc" stroke-width="1.5" opacity="0.35">
    <line x1="100" y1="40" x2="95" y2="70"><animate attributeName="y1" values="20;50;20" dur="1.4s" repeatCount="indefinite"/><animate attributeName="y2" values="50;80;50" dur="1.4s" repeatCount="indefinite"/></line>
    <line x1="140" y1="30" x2="134" y2="68"><animate attributeName="y1" values="15;45;15" dur="1.7s" begin="0.2s" repeatCount="indefinite"/><animate attributeName="y2" values="55;90;55" dur="1.7s" begin="0.2s" repeatCount="indefinite"/></line>
    <line x1="180" y1="50" x2="176" y2="85"><animate attributeName="y1" values="35;65;35" dur="1.5s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="y2" values="70;105;70" dur="1.5s" begin="0.5s" repeatCount="indefinite"/></line>
    <line x1="230" y1="25" x2="225" y2="60"><animate attributeName="y1" values="10;40;10" dur="1.3s" begin="0.1s" repeatCount="indefinite"/><animate attributeName="y2" values="45;75;45" dur="1.3s" begin="0.1s" repeatCount="indefinite"/></line>
  </g>
</svg>
